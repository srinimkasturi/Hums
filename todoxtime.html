<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Tear-Off Planner with Hiding Toggle</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f4f4f2;
            color: #333;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        
        .panel {
            background: #fff;
            border: 2px solid #333;
            border-radius: 4px;
            padding: 15px;
            overflow-y: auto;
            box-shadow: 3px 3px 0px #333;
            transition: flex 0.2s ease, padding 0.2s ease;
        }
        
        #top-panel {
            flex: 1.2;
            margin-bottom: 15px;
            border-bottom: 4px dashed #999;
        }
        
        #bottom-panel {
            flex: 0.8;
        }

        /* Collapsed Main Panels */
        .panel.collapsed {
            flex: 0 0 45px !important;
            overflow: hidden;
            padding-top: 5px;
            padding-bottom: 5px;
            background: #eaeaea;
        }
        .panel.collapsed .panel-content {
            display: none;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }
        .collapsed .panel-header {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .tear-off-btn {
            background: #ff4d4d;
            color: white;
            border: 1px solid #333;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 2px 2px 0px #333;
        }
        .tear-off-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #333;
        }

        .toggle-btn {
            background: #666;
            color: white;
            border: 1px solid #333;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 2px 2px 0px #333;
        }

        .settings-select {
            font-family: inherit;
            padding: 4px;
            border: 1px solid #333;
            background: #fff;
        }

        /* Calendar Layout */
        .months-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .month-box {
            border: 1px solid #ccc;
            padding: 10px;
            transition: background-color 0.2s;
        }
        .month-box.month-hidden {
            padding: 5px 10px;
            background: #e8e8e8;
        }
        .month-box.month-hidden .calendar-grid {
            display: none;
        }
        .month-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #eee;
            padding: 2px 6px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .month-box.month-hidden .month-header-row {
            margin-bottom: 0;
        }
        .month-toggle-vis-btn {
            background: #fff;
            border: 1px solid #777;
            cursor: pointer;
            font-size: 11px;
            padding: 2px 6px;
            font-family: inherit;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
            font-size: 12px;
        }
        .day-header { font-weight: bold; background: #ddd; padding: 2px; }
        
        .day-cell {
            border: 1px solid #eee;
            min-height: 55px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: #fafafa;
            padding: 4px;
            box-sizing: border-box;
        }
        .day-number { font-size: 10px; text-align: left; color: #666; }
        
        .day-input {
            width: 100%;
            border: none;
            background: transparent;
            text-align: center;
            font-family: inherit;
            font-weight: bold;
            color: #0056b3;
            box-sizing: border-box;
            font-size: 14px;
        }
        .day-input:focus { background: #ffffcc; outline: none; }

        .day-input.task-struck-out {
            text-decoration: line-through;
            color: #bbb;
            font-style: italic;
        }

        /* To-Do List Layout */
        .todo-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 16px;
            gap: 10px;
        }
        .todo-item.hidden-task-style {
            background: #f0f0f0;
            opacity: 0.6;
            border-left: 3px dashed #999;
            padding-left: 4px;
        }
        .todo-number {
            font-weight: bold;
            width: 40px;
            color: #555;
        }
        .todo-text {
            cursor: pointer;
            flex-grow: 1;
        }
        .completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }
        
        .action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .action-btn:hover {
            background: #ddd;
        }

        .todo-input-zone {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        #new-todo {
            flex-grow: 1;
            padding: 5px;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <!-- TOP PANEL: 3-MONTH CALENDAR -->
    <div id="top-panel" class="panel">
        <div class="panel-header">
            <h2>3-Month Planning Window</h2>
            <div class="header-actions">
                <button class="tear-off-btn" onclick="tearOffCalendar()">✂ Tear Off Full Calendar</button>
                <button class="toggle-btn" id="toggle-cal-btn" onclick="togglePanel('top-panel', 'toggle-cal-btn')">Hide Panel</button>
            </div>
        </div>
        <div class="panel-content">
            <div class="months-container" id="calendar-container"></div>
        </div>
    </div>

    <!-- BOTTOM PANEL: NUMBERED TO-DOS -->
    <div id="bottom-panel" class="panel">
        <div class="panel-header">
            <h2>Numbered To-Do List</h2>
            <div class="header-actions">
                <!-- Toggle showing hidden tasks in list -->
                <button id="show-hidden-toggle" class="toggle-btn" style="background:#5cb85c;" onclick="toggleShowHiddenTasks()">Show Hidden Tasks</button>
                
                <label for="purge-setting" style="font-size: 12px; font-weight: bold; margin-left:10px;">Auto-Purge Done:</label>
                <select id="purge-setting" class="settings-select" onchange="changePurgeSetting(this.value)">
                    <option value="never">Never (Manual)</option>
                    <option value="1">After 1 Day</option>
                    <option value="3">After 3 Days</option>
                    <option value="7">After 7 Days</option>
                </select>
                <button class="tear-off-btn" onclick="tearOffTodos()">✂ Tear Off Done Tasks</button>
                <button class="toggle-btn" id="toggle-todo-btn" onclick="togglePanel('bottom-panel', 'toggle-todo-btn')">Hide Panel</button>
            </div>
        </div>
        <div class="panel-content">
            <div id="todo-list"></div>
            <div class="todo-input-zone">
                <input type="text" id="new-todo" spellcheck="true" placeholder="Enter a new task..." onkeypress="if(event.key === 'Enter') addTodo()">
                <button style="padding: 5px 15px;" onclick="addTodo()">Add</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA SETUP & LOCAL STORAGE ---
        let todos = JSON.parse(localStorage.getItem('planner_todos')) || [];
        let nextTodoId = parseInt(localStorage.getItem('planner_next_id')) || 1;
        let calendarData = JSON.parse(localStorage.getItem('planner_calendar')) || {};
        let hiddenMonths = JSON.parse(localStorage.getItem('planner_hidden_months')) || {}; // Structure: {"YYYY-MM": true}
        let purgeThresholdDays = localStorage.getItem('planner_purge_days') || 'never';
        let showHiddenTasksState = false; 

        document.getElementById('purge-setting').value = purgeThresholdDays;

        // --- PANEL DISPLAY TOGGLES ---
        function togglePanel(panelId, btnId) {
            const panel = document.getElementById(panelId);
            const btn = document.getElementById(btnId);
            
            if (panel.classList.contains('collapsed')) {
                panel.classList.remove('collapsed');
                btn.innerText = "Hide Panel";
            } else {
                panel.classList.add('collapsed');
                btn.innerText = "Show Panel";
            }
        }

        function toggleShowHiddenTasks() {
            showHiddenTasksState = !showHiddenTasksState;
            document.getElementById('show-hidden-toggle').innerText = showHiddenTasksState ? "Hide Hidden Tasks" : "Show Hidden Tasks";
            document.getElementById('show-hidden-toggle').style.background = showHiddenTasksState ? "#f0ad4e" : "#5cb85c";
            renderTodos();
        }

        // --- AUTOMATIC PURGE ENGINE ---
        function runAutoPurgeCheck() {
            if (purgeThresholdDays === 'never') return;
            
            const targetDays = parseInt(purgeThresholdDays);
            const now = new Date().getTime();
            const msThreshold = targetDays * 24 * 60 * 60 * 1000;

            const originalLength = todos.length;
            
            todos = todos.filter(todo => {
                if (!todo.completed || !todo.completedAt) return true;
                const age = now - todo.completedAt;
                return age < msThreshold;
            });

            if (todos.length !== originalLength) {
                localStorage.setItem('planner_todos', JSON.stringify(todos));
                renderTodos();
                renderCalendar();
            }
        }

        function changePurgeSetting(val) {
            purgeThresholdDays = val;
            localStorage.setItem('planner_purge_days', val);
            runAutoPurgeCheck();
        }

        // --- CALENDAR MANAGEMENT ---
        function renderCalendar() {
            const container = document.getElementById('calendar-container');
            container.innerHTML = '';
            
            const d = new Date();
            let currentMonth = d.getMonth();
            let currentYear = d.getFullYear();

            for (let m = 0; m < 3; m++) {
                let displayMonth = (currentMonth + m) % 12;
                let displayYear = currentYear + Math.floor((currentMonth + m) / 12);
                container.appendChild(createMonthElement(displayYear, displayMonth));
            }
        }

        function createMonthElement(year, month) {
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const daysShort = ["S", "M", "T", "W", "T", "F", "S"];
            const monthKey = `${year}-${String(month + 1).padStart(2, '0')}`;
            
            const monthBox = document.createElement('div');
            monthBox.className = 'month-box';
            if (hiddenMonths[monthKey]) {
                monthBox.classList.add('month-hidden');
            }
            
            const headerRow = document.createElement('div');
            headerRow.className = 'month-header-row';
            
            const titleSpan = document.createElement('span');
            titleSpan.innerText = `${monthNames[month]} ${year}`;
            headerRow.appendChild(titleSpan);
            
            // NEW: Individual Month Hide/Show Button
            const toggleVisBtn = document.createElement('button');
            toggleVisBtn.className = 'month-toggle-vis-btn';
            toggleVisBtn.innerText = hiddenMonths[monthKey] ? "👁️ Show" : "👁️ Hide";
            toggleVisBtn.onclick = () => {
                hiddenMonths[monthKey] = !hiddenMonths[monthKey];
                localStorage.setItem('planner_hidden_months', JSON.stringify(hiddenMonths));
                renderCalendar();
            };
            headerRow.appendChild(toggleVisBtn);
            
            monthBox.appendChild(headerRow);
            
            const grid = document.createElement('div');
            grid.className = 'calendar-grid';
            
            daysShort.forEach(d => {
                const head = document.createElement('div');
                head.className = 'day-header';
                head.innerText = d;
                grid.appendChild(head);
            });
            
            const firstDay = new Date(year, month, 1).getDay();
            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }
            
            const totalDays = new Date(year, month + 1, 0).getDate();
            for (let day = 1; day <= totalDays; day++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                
                const numSpan = document.createElement('div');
                numSpan.className = 'day-number';
                numSpan.innerText = day;
                cell.appendChild(numSpan);
                
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                const input = document.createElement('input');
                input.className = 'day-input';
                input.type = 'text';
                input.placeholder = "-";
                input.value = calendarData[dateKey] || '';
                input.setAttribute('spellcheck', 'true');
                
                input.oninput = (e) => {
                    calendarData[dateKey] = e.target.value;
                    localStorage.setItem('planner_calendar', JSON.stringify(calendarData));
                    evaluateStrikeThrough(input, e.target.value);
                };
                
                evaluateStrikeThrough(input, input.value);
                
                cell.appendChild(input);
                grid.appendChild(cell);
            }
            
            monthBox.appendChild(grid);
            return monthBox;
        }

        function evaluateStrikeThrough(inputElement, value) {
            if (!value.trim()) {
                inputElement.classList.remove('task-struck-out');
                return;
            }

            const foundNumbers = value.match(/\d+/g) || [];
            if (foundNumbers.length === 0) {
                inputElement.classList.remove('task-struck-out');
                return;
            }

            const allFinished = foundNumbers.every(numStr => {
                const id = parseInt(numStr);
                const match = todos.find(t => t.id === id);
                return match ? match.completed : false;
            });

            if (allFinished) {
                inputElement.classList.add('task-struck-out');
            } else {
                inputElement.classList.remove('task-struck-out');
            }
        }

        // --- TO-DO MANAGEMENT ---
        function renderTodos() {
            const listDiv = document.getElementById('todo-list');
            listDiv.innerHTML = '';
            
            todos.forEach(todo => {
                // If task is hidden and we aren't showing hidden elements, skip it completely
                if (todo.hidden && !showHiddenTasksState) return;

                const item = document.createElement('div');
                item.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                if (todo.hidden) {
                    item.classList.add('hidden-task-style');
                }
                
                const num = document.createElement('span');
                num.className = 'todo-number';
                num.innerText = `#${todo.id}`;
                
                const text = document.createElement('span');
                text.className = 'todo-text';
                text.innerText = todo.text + (todo.hidden ? " [HIDDEN]" : "");
                text.onclick = () => toggleTodo(todo.id);
                
                // NEW: Toggle Hiding an individual task instead of wiping it completely
                const hideBtn = document.createElement('button');
                hideBtn.className = 'action-btn';
                hideBtn.innerHTML = todo.hidden ? '👁️' : '👁️‍🗨️';
                hideBtn.title = todo.hidden ? "Unhide this task" : "Hide this task";
                hideBtn.onclick = (e) => {
                    e.stopPropagation();
                    toggleHideTodoItem(todo.id);
                };
                
                item.appendChild(num);
                item.appendChild(text);
                item.appendChild(hideBtn);
                listDiv.appendChild(item);
            });
        }

        function addTodo() {
            const input = document.getElementById('new-todo');
            const text = input.value.trim();
            if (!text) return;
            
            todos.push({ id: nextTodoId, text: text, completed: false, completedAt: null, hidden: false });
            nextTodoId++;
            
            localStorage.setItem('planner_todos', JSON.stringify(todos));
            localStorage.setItem('planner_next_id', nextTodoId);
            
            input.value = '';
            renderTodos();
            renderCalendar(); 
        }

        function toggleTodo(id) {
            todos = todos.map(t => {
                if (t.id === id) {
                    const nextStatus = !t.completed;
                    return { 
                        ...t, 
                        completed: nextStatus,
                        completedAt: nextStatus ? new Date().getTime() : null
                    };
                }
                return t;
            });
            localStorage.setItem('planner_todos', JSON.stringify(todos));
            renderTodos();
            renderCalendar(); 
        }

        // Toggles a task's internal visibility state
        function toggleHideTodoItem(id) {
            todos = todos.map(t => t.id === id ? { ...t, hidden: !t.hidden } : t);
            localStorage.setItem('planner_todos', JSON.stringify(todos));
            renderTodos();
        }

        // --- TEAR-OFF OPERATIONS ---
        function tearOffCalendar() {
            if (confirm("Are you sure you want to tear off ALL calendar entries?")) {
                calendarData = {};
                localStorage.setItem('planner_calendar', JSON.stringify(calendarData));
                renderCalendar();
            }
        }

        function tearOffTodos() {
            if (confirm("Tear off page? This removes all struck-through tasks from the list below.")) {
                todos = todos.filter(t => !t.completed);
                localStorage.setItem('planner_todos', JSON.stringify(todos));
                renderTodos();
                renderCalendar();
            }
        }

        // --- INITIALIZATION ---
        renderCalendar();
        renderTodos();
        runAutoPurgeCheck();
        setInterval(runAutoPurgeCheck, 3600000);
    </script>
</body>
</html>
