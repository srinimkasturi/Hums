<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  :root {

  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid var(--soft);
    background: var(--white);
    flex-shrink: 0;
    z-index: 10;
  }
  .topbar-title { font-family: 'Playfair Display', serif; font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .slide-counter { font-family: 'Crimson Pro', serif; font-size: 0.8rem; color: var(--muted); letter-spacing: 0.05em; }
  .hums-badge { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); font-family: 'Playfair Display', serif; }
  .progress-bar { height: 2px; background: var(--soft); flex-shrink: 0; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }
  .stage { flex: 1; display: flex; overflow: hidden; position: relative; }
  .slide { position: absolute; inset: 0; display: flex; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
  .slide.active { opacity: 1; pointer-events: all; }
  .slide.layout-cover { flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
  .slide.layout-split { flex-direction: row; align-items: stretch; }
  .slide.layout-framework { flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; padding: 24px 32px; }
  .illus-panel { width: 40%; flex-shrink: 0; border-right: 1px solid var(--soft); background: #faf9f6; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 16px 16px 0; }
  .illus-panel svg { width: 100%; max-height: 100%; max-width: 340px; }
  .text-panel { flex: 1; padding: 32px 40px; display: flex; flex-direction: column; justify-content: center; overflow-y: auto; }
  .slide-label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; font-family: 'Playfair Display', serif; }
  .slide-title { font-family: 'Playfair Display', serif; font-size: clamp(1.3rem, 2.8vw, 2rem); line-height: 1.2; margin-bottom: 18px; color: var(--ink); }
  .slide-body { font-size: clamp(0.88rem, 1.4vw, 1.02rem); line-height: 1.85; color: #3a3a3a; max-width: 520px; }
  .slide-body p + p { margin-top: 0.9em; }
  .slide-body em { font-style: italic; color: var(--accent); }
  .slide-body strong { font-weight: 600; }
  .cover-svg-wrap { width: 200px; height: 200px; margin-bottom: 24px; }
  .cover-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.2rem); line-height: 1.1; color: var(--ink); margin-bottom: 10px; }
  .cover-sub { font-size: 1rem; color: var(--muted); margin-bottom: 6px; font-style: italic; }
  .cover-author { font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-top: 16px; }
  .framework-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; text-align: center; margin-bottom: 18px; }
  .buckets-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; width: 100%; max-width: 860px; }
  .bucket-card { border: 1px solid var(--soft); border-radius: 4px; padding: 13px 15px; background: #faf9f6; }
  .bucket-name { font-family: 'Playfair Display', serif; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 7px; }
  .bucket-signals { font-size: 0.82rem; color: #555; line-height: 1.7; }
  .nav-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 28px; border-top: 1px solid var(--soft); background: var(--white); flex-shrink: 0; }
  .nav-btn { background: none; border: 1px solid var(--soft); cursor: pointer; padding: 8px 22px; font-family: 'Crimson Pro', serif; font-size: 0.9rem; color: var(--ink); letter-spacing: 0.08em; border-radius: 2px; transition: all 0.2s; }

  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .nav-btn.primary:hover { background: #333; }
  .picker-btn { font-size: 0.82rem; letter-spacing: 0.04em; min-width: 100px; }
  .picker-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 100;
  }
  .picker-overlay.open { display: block; }
  .picker-drawer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-height: 70vh;
    background: var(--white);
    border-top: 2px solid var(--soft);
    border-radius: 14px 14px 0 0;
    z-index: 101;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
  }
  .picker-drawer.open { transform: translateY(0); }
  .picker-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--soft);
    flex-shrink: 0;
  }
  .picker-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .picker-close {
    background: none; border: none; cursor: pointer;
    font-size: 1rem; color: var(--muted); padding: 4px 8px;
    border-radius: 50%; transition: background 0.15s;
  }
  .picker-close:hover { background: var(--soft); }
  .picker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
    gap: 8px;
    padding: 14px 16px 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .picker-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 5px;
    padding: 8px 4px 10px;
    border: 1.5px solid var(--soft);
    border-radius: 6px;
    cursor: pointer;
    background: #faf9f6;
    transition: all 0.15s;
    text-align: center;
    min-height: 80px;
  }
  .picker-tile:hover { border-color: var(--muted); background: var(--white); }
  .picker-tile.current { border-color: var(--accent); background: #fff8f7; }
  .picker-tile .pt-num {
    font-size: 0.6rem;
    color: var(--muted);
    font-family: 'Crimson Pro', serif;
    letter-spacing: 0.06em;
  }
  .picker-tile .pt-icon { font-size: 1.4rem; line-height: 1; }
  .picker-tile .pt-label {
    font-family: 'Playfair Display', serif;
    font-size: 0.62rem;
    color: var(--ink);
    line-height: 1.3;
    word-break: break-word;
  }
  .picker-tile.current .pt-label { color: var(--accent); font-style: italic; }
  .key-hint { position: fixed; bottom: 60px; right: 20px; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; opacity: 0.6; }
  .illus-panel { display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
  .illus-panel svg { flex: 1; min-height: 0; width: 100%; max-width: 320px; }
  .dress-tag {

    width: 100%;
    border-top: 1px solid var(--soft);

@media (max-width: 680px) {

  .illus-panel { width: 100%; height: 200px; border-right: none; border-bottom: 1px solid var(--soft); }
  .text-panel { padding: 20px; }
  .buckets-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

function slideTemplate(slide, index) {
  const num = index + 1;
  if (slide.layout === "cover") {
    return `
      <section class="slide layout-cover ${index === 0 ? 'active' : ''}" data-index="${index}">
        ${slide.html}
      </section>
    `;
  }
  if (slide.layout === "framework") {
    return `
      <section class="slide layout-framework ${index === 0 ? 'active' : ''}" data-index="${index}">
        <div class="framework-title">${slide.title}</div>
        <div class="slide-body">${slide.body}</div>
      </section>
    `;
  }
  return `
    <section class="slide layout-split ${index === 0 ? 'active' : ''}" data-index="${index}">
      <div class="illus-panel">
        ${slide.svg}
        <div class="dress-tag">
          <span class="dtop">${slide.label}</span>
          <span class="dtip">${num} of ${slides.length}</span>
        </div>
      </div>
      <div class="text-panel">
        <div class="slide-label">${slide.label}</div>
        <div class="slide-title">${slide.title}</div>
        <div class="slide-body">${slide.body}</div>
      </div>
    </section>
  `;
}

function renderSlides() {
  document.getElementById("stage").innerHTML = slides.map(slideTemplate).join("");
}

function renderPicker() {
  document.getElementById("pickerGrid").innerHTML = slides.map((slide, i) => `
    <div class="picker-tile ${i === 0 ? 'current' : ''}" data-index="${i}">
      <div class="pt-num">${String(i + 1).padStart(2, "0")}</div>
      <div class="pt-icon">${slide.icon}</div>
      <div class="pt-label">${slide.title}</div>
    </div>
  `).join("");
}

let currentSlide = 0;

function updateUI() {
  document.querySelectorAll(".slide").forEach((el, i) => {
    el.classList.toggle("active", i === currentSlide);
  });
  document.querySelectorAll(".picker-tile").forEach((el, i) => {
    el.classList.toggle("current", i === currentSlide);
  });
  document.getElementById("counterDisplay").textContent = `${currentSlide + 1} / ${slides.length}`;
  document.getElementById("progressFill").style.width = `${((currentSlide + 1) / slides.length) * 100}%`;
  document.getElementById("prevBtn").disabled = currentSlide === 0;
  document.getElementById("nextBtn").disabled = currentSlide === slides.length - 1;
}

function goToSlide(index) {
  currentSlide = Math.max(0, Math.min(index, slides.length - 1));
  updateUI();
}

function changeSlide(delta) {
  goToSlide(currentSlide + delta);
}

function openPicker() {
  document.getElementById("pickerOverlay").classList.add("open");
  document.getElementById("pickerDrawer").classList.add("open");
}

function closePicker() {
  document.getElementById("pickerOverlay").classList.remove("open");
  document.getElementById("pickerDrawer").classList.remove("open");
}

function togglePicker() {
  const drawer = document.getElementById("pickerDrawer");
  if (drawer.classList.contains("open")) closePicker();
  else openPicker();
}

renderSlides();
renderPicker();
updateUI();

document.getElementById("prevBtn").addEventListener("click", () => changeSlide(-1));
document.getElementById("nextBtn").addEventListener("click", () => changeSlide(1));
document.getElementById("pickerBtn").addEventListener("click", togglePicker);
document.getElementById("closePickerBtn").addEventListener("click", closePicker);
document.getElementById("pickerOverlay").addEventListener("click", closePicker);

document.getElementById("pickerGrid").addEventListener("click", (e) => {
  const tile = e.target.closest(".picker-tile");
  if (!tile) return;
  goToSlide(Number(tile.dataset.index));
  closePicker();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") changeSlide(-1);
  if (e.key === "ArrowRight") changeSlide(1);
  if (e.key === "Escape") closePicker();
});
</script>
