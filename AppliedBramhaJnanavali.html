<script id="vdata" type="application/json">[{"n":1,"sk":"\u0938\u0915\u0943\u0924\u094d \u0936\u094d\u0930\u0935\u0923\u092e\u093e\u0924\u094d\u0930\u0947\u0923 \u092c\u094d\u0930\u0939\u094d\u092e\u091c\u094d\u091e\u093e\u0928\u0902 \u092f\u0924\u094b \u092d\u0935\u0947\u0924\u094d \u0964\n\u092c\u094d\u0930\u0939\u094d\u092e\u091c\u094d\u091e\u093e\u0928\u093e\u0935\u0932\u0940\u092e\u093e\u0932\u093e \u0938\u0930\u094d\u0935\u0947\u0937\u093e\u0902 \u092e\u094b\u0915\u094d\u0937\u0938\u093f\u0926\u094d\u0927\u092f\u0947 \u0965","ro":"sakrit shravanamaatrena brahmajnanam yato bhavet\nbrahmajnanavalimaala sarveshaam moksha-siddhaye","me":"This garland of the knowledge of Brahman, by hearing which just once the knowledge of Brahman is attained, is offered for the liberation of all.","ins":"This is not a text to be studied. It is a text to be heard inwardly. Even once. The promise is built into the opening."},{"n":2,"sk":"\u0905\u0938\u0919\u094d\u0917\u094b\u093d\u0939\u092e\u0938\u0919\u094d\u0917\u094b\u093d\u0939\u092e\u0938\u0919\u094d\u0917\u094b\u093d\u0939\u0902 \u092a\u0941\u0928\u0903 \u092a\u0941\u0928\u0903 \u0964\n\u0938\u091a\u094d\u091a\u093f\u0926\u093e\u0928\u0928\u094d\u0926\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965","ro":"asango-aham asango-aham asango-aham punah punah\nsaccidanandarupo-aham ahamevaaham avyayah","me":"Unattached am I, unattached am I, unattached am I - again and again. I am of the nature of Existence-Consciousness-Bliss. I am the very Self, indestructible.","ins":"The triple repetition is the method itself. The mind needs to hear the truth three times before it loosens its grip on the false."},{"n":3,"sk":"\u0928\u093f\u0924\u094d\u092f\u0936\u0941\u0926\u094d\u0927\u0935\u093f\u092e\u0941\u0915\u094d\u0924\u094b\u093d\u0939\u0902 \u0928\u093f\u0930\u093e\u0915\u093e\u0930\u094b\u093d\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0964\n\u092d\u0942\u092e\u093e\u0928\u0928\u094d\u0926\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965","ro":"nityashuddha-vimukto-aham niraakaro-aham avyayah\nbhumananda-svarupo-aham ahamevaaham avyayah","me":"I am eternally pure, I am liberated, I am formless, I am indestructible. I am of the nature of infinite, boundless bliss. I am the very Self, indestructible and changeless.","ins":"Purity here is not moral - it is ontological. Not I have become pure but I am by nature never impure. Liberation is not future - it is recognition of what already is."},{"n":4,"sk":"\u0935\u093f\u091c\u094d\u091e\u093e\u0928\u0918\u0928\u0930\u0942\u092a\u094b\u093d\u0939\u0902 \u091a\u093f\u0926\u093e\u0915\u093e\u0936\u094b\u093d\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0964\n\u0915\u0947\u0935\u0932\u093e\u0928\u0928\u094d\u0926\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965","ro":"vijnanaghanarupo-aham cidakasho-aham avyayah\nkevalaanandarupo-aham ahamevaaham avyayah","me":"I am of the nature of dense, solid awareness. I am the sky of consciousness, indestructible. I am pure, unconditioned bliss. I am the very Self, indestructible and changeless.","ins":"Cidakasha - the sky of consciousness - nothing sticks to it. Clouds pass. The sky remains. You are the sky, not the cloud."},{"n":5,"sk":"\u0928\u093f\u0924\u094d\u092f\u093e\u0928\u0928\u094d\u0926\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u0902 \u092a\u0930\u092e\u093e\u0928\u0928\u094d\u0926\u0930\u0942\u092a\u0927\u0943\u0915\u094d \u0964\n\u092e\u0941\u0915\u094d\u0924\u093e\u0928\u0928\u094d\u0926\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965","ro":"nityaanandasvarupo-aham paramaanandarupadhrik\nmuktaanandasvarupo-aham ahamevaaham avyayah","me":"I am of the nature of eternal bliss. I am the bearer of supreme bliss. I am the bliss of liberation. I am the very Self, indestructible and changeless.","ins":"Three flavors of ananda: nitya (eternal), parama (supreme), mukta (free). Shankara descends like three steps into the same ocean."},{"n":6,"sk":"\u0938\u0924\u094d\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u093f\u0924\u094d\u092f\u0947\u0935\u0902 \u092f\u0903 \u0915\u0930\u094b\u0924\u093f \u0938\u0926\u093e \u091c\u092a\u092e\u094d \u0964\n\u092d\u0935\u092a\u093e\u0936\u0935\u093f\u0928\u093f\u0930\u094d\u092e\u0941\u0915\u094d\u0924\u0903 \u0938 \u092f\u093e\u0924\u093f \u092a\u0930\u092e\u093e\u0902 \u0917\u0924\u093f\u092e\u094d \u0965","ro":"satsvarupo-aham ityevam yah karoti sada japam\nbhavapashaavinirmuktah sa yaati paramaam gatim","me":"One who constantly repeats as japa - freed from the bonds of worldly existence, that one attains the supreme state.","ins":"The japa is not a request to become. It is a remembering of what you already are. Repetition wears down the false."},{"n":7,"sk":"\u0905\u0939\u092e\u0947\u0935 \u092a\u0930\u0902 \u092c\u094d\u0930\u0939\u094d\u092e \u0905\u0939\u092e\u0947\u0935 \u092a\u0930\u0902 \u092a\u0926\u092e\u094d \u0964\n\u0905\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965","ro":"ahameva param brahma ahameva param padam\nahamevaahamevaaham ahamevaaham avyayah","me":"I alone am the supreme Brahman. I alone am the supreme state. I am, I am, I am - I am the very Self, indestructible and changeless.","ins":"The I speaking here is not the ego. Only Brahman can say I am Brahman truthfully. To realize this verse is to realize who is speaking."},{"n":8,"sk":"\u0905\u0928\u094d\u0924\u0930\u093e\u0924\u094d\u092e\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u0902 \u092a\u094d\u0930\u0924\u094d\u092f\u0917\u093e\u0924\u094d\u092e\u0938\u094d\u0935\u0930\u0942\u092a\u0927\u0943\u0915\u094d \u0964\n\u0936\u0941\u0926\u094d\u0927\u091a\u0948\u0924\u0928\u094d\u092f\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965","ro":"antaraatmasvarupo-aham pratyagaatmasvarupadhrik\nshuddha-caitanyarupo-aham ahamevaaham avyayah","me":"I am the inner Self. I am the innermost Self, the awareness that turns back inward. I am pure consciousness itself. I am the very Self, indestructible and changeless.","ins":"Pratyagatman - the Self that faces inward, against the outward current of the senses. This is the direction of self-inquiry."},{"n":9,"sk":"\u0906\u0924\u094d\u092e\u091c\u094d\u091e\u093e\u0928\u092a\u094d\u0930\u0915\u093e\u0936\u094b\u093d\u0939\u0902 \u0938\u0924\u094d\u0924\u093e\u092e\u093e\u0924\u094d\u0930\u0938\u094d\u0935\u0930\u0942\u092a\u0927\u0943\u0915\u094d \u0964\n\u0906\u0928\u0928\u094d\u0926\u093e\u092e\u0943\u0924\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965","ro":"aatmajnaanaprakaasho-aham sattaamaatrasvarupadhrik\naanandamritarupo-aham ahamevaaham avyayah","me":"I am the luminosity of Self-knowledge. I am pure being itself. I am the immortal nectar of bliss. I am the very Self, indestructible and changeless.","ins":"The Self is self-luminous - it does not require another awareness to know it. This is what makes Advaita radical."},{"n":10,"sk":"\u0917\u0941\u0923\u0924\u094d\u0930\u092f\u0935\u094d\u092f\u0924\u0940\u0924\u094b\u093d\u0939\u0902 \u092c\u094d\u0930\u0939\u094d\u092e\u093e\u0926\u0940\u0928\u093e\u0902 \u091a \u0938\u093e\u0915\u094d\u0937\u094d\u092f\u0939\u092e\u094d \u0964\n\u0905\u0928\u0928\u094d\u0924\u093e\u0928\u0928\u094d\u0926\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965","ro":"gunatrayavyatiito-aham brahmaadiinam ca saakshyaham\nanantaanandarupo-aham ahamevaaham avyayah","me":"I am beyond the three gunas - sattva, rajas, and tamas. I am the witness of even Brahma and others. I am of the nature of infinite bliss.","ins":"Not even Brahma is the ultimate witness - the Self witnesses all creative power itself. A staggering claim, delivered quietly."},{"n":11,"sk":"\u0905\u0928\u094d\u0924\u0930\u094d\u092f\u093e\u092e\u093f\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u0902 \u0915\u0942\u091f\u0938\u094d\u0925\u0903 \u0938\u0930\u094d\u0935\u0917\u094b\u093d\u0938\u094d\u092e\u094d\u092f\u0939\u092e\u094d \u0964\n\u092a\u0930\u092e\u093e\u0924\u094d\u092e\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965","ro":"antaraamisvarupo-aham kuutasthah sarvago-asmyaham\nparamaatmasvarupo-aham ahamevaaham avyayah","me":"I am the inner controller. I am immutable, the unchanging anvil. I am all-pervading. I am the supreme Self. I am the very Self, indestructible and changeless.","ins":"Kutastha - what strikes all things without being struck itself. The deepest stillness in the midst of all movement."},{"n":12,"sk":"\u0928\u093f\u0937\u094d\u0915\u0932\u094b\u093d\u0939\u0902 \u0928\u093f\u0937\u094d\u0915\u094d\u0930\u093f\u092f\u094b\u093d\u0939\u0902 \u0938\u0930\u094d\u0935\u093e\u0924\u094d\u092e\u093e \u0906\u0926\u094d\u092f\u0903 \u0938\u0928\u093e\u0924\u0928\u0903 \u0964\n\u0905\u092a\u0930\u094b\u0915\u094d\u0937\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965","ro":"nishkalo-aham nishkriyo-aham sarvaatmaa aadyah sanaatanah\naparoksha-svarupo-aham ahamevaaham avyayah","me":"I am without parts. I am actionless. I am the self of all, the primordial, the ancient, the eternal. I am the directly intuited Self - not known through inference but directly.","ins":"Aparoksha - not mediated, not inferred, not heard about. The Self is the only knowledge that is its own object."},{"n":13,"sk":"\u0926\u094d\u0935\u0928\u094d\u0926\u094d\u0935\u093e\u0926\u093f\u0938\u093e\u0915\u094d\u0937\u093f\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u091a\u0932\u094b\u093d\u0939\u0902 \u0938\u0928\u093e\u0924\u0928\u0903 \u0964\n\u0938\u0930\u094d\u0935\u0938\u093e\u0915\u094d\u0937\u093f\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965","ro":"dvandvaadisaakshirupo-aham acalo-aham sanaatanah\nsarvasaakshisvarupo-aham ahamevaaham avyayah","me":"I am the witness of all pairs of opposites - pleasure and pain, heat and cold. I am immovable. I am eternal. I am the witness of everything.","ins":"Dvandva - the pairs. The Self witnesses both without choosing. This is equanimity - not resolution of opposites, but what stands behind them both."},{"n":14,"sk":"\u0905\u0915\u0930\u094d\u0924\u0943\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u092d\u094b\u0915\u094d\u0924\u0943\u0938\u094d\u0935\u0930\u0942\u092a\u0927\u0943\u0915\u094d \u0964\n\u0915\u0947\u0935\u0932\u0938\u094d\u0935\u092a\u094d\u0930\u0915\u093e\u0936\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965","ro":"akartrisvarupo-aham abhoktrisvarupadhrik\nkevalasvapraakaasho-aham ahamevaaham avyayah","me":"I am not a doer. I am not an experiencer. I am pure self-luminosity alone. I am the very Self, indestructible and changeless.","ins":"The one reading this is told they are neither doing the reading nor experiencing it. And yet there is awareness of both. That awareness is what is pointed to."},{"n":15,"sk":"\u0928\u093f\u0930\u093e\u0927\u093e\u0930\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u0902 \u0938\u0930\u094d\u0935\u093e\u0927\u093e\u0930\u094b\u093d\u0939\u092e\u0947\u0935 \u091a \u0964\n\u0906\u092a\u094d\u0924\u0915\u093e\u092e\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965","ro":"niraadharasvarupo-aham sarvaadhaaro-ahameva ca\naaptakamasvarupo-aham ahamevaaham avyayah","me":"I am without any support, and I am the support of all. I have no desires yet to be fulfilled. I am the very Self, indestructible and changeless.","ins":"Both at once: the unsupported and the support of all. Advaita holds contradiction not by resolving it, but by finding the level at which it dissolves."},{"n":16,"sk":"\u0924\u093e\u092a\u0924\u094d\u0930\u092f\u0935\u093f\u0928\u093f\u0930\u094d\u092e\u0941\u0915\u094d\u0924\u094b \u0926\u0947\u0939\u0924\u094d\u0930\u092f\u0935\u093f\u0932\u0915\u094d\u0937\u0923\u0903 \u0964\n\u0905\u0935\u0938\u094d\u0925\u093e\u0924\u094d\u0930\u092f\u0938\u093e\u0915\u094d\u0937\u094d\u092f\u0938\u094d\u092e\u093f \u091a\u093e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965","ro":"taapatrayavinirmukto dehatrayavilakshanah\navasthaatraya-saakshyasmi caahamevaaham avyayah","me":"I am free from the threefold afflictions. I am distinct from the three bodies - gross, subtle, causal. I am the witness of the three states - waking, dream, and deep sleep.","ins":"Three threes: three afflictions, three bodies, three states - and in all of them, the same witness remains."},{"n":17,"sk":"\u0926\u0943\u0917\u094d\u0926\u0943\u0936\u094d\u092f\u094c \u0926\u094d\u0935\u094c \u092a\u0926\u093e\u0930\u094d\u0925\u094c \u0938\u094d\u0924\u0903 \u092a\u0930\u0938\u094d\u092a\u0930\u0935\u093f\u0932\u0915\u094d\u0937\u0923\u094c \u0964\n\u0926\u0943\u0917\u094d\u092c\u094d\u0930\u0939\u094d\u092e \u0926\u0943\u0936\u094d\u092f\u0902 \u092e\u093e\u092f\u0947\u0924\u093f \u0938\u0930\u094d\u0935\u0947\u0926\u093e\u0928\u094d\u0924\u0921\u093f\u0923\u094d\u0921\u093f\u092e\u0903 \u0965","ro":"drig-drishyau dvau padaarthau stah parasparavilakshanau\ndrig-brahma drishyam maayeti sarva-vedaanta-dindimah","me":"There are two things entirely different: the seer and the seen. The seer is Brahman; the seen is Maya. This is the drumbeat of all Vedanta.","ins":"Dindima - a small drum. All of Vedanta can be beaten out in this one rhythm: the seer and the seen are not the same."},{"n":18,"sk":"\u0905\u0939\u0902 \u0938\u093e\u0915\u094d\u0937\u0940\u0924\u093f \u092f\u094b \u0935\u093f\u0926\u094d\u092f\u093e\u0924\u094d \u0935\u093f\u0935\u093f\u091a\u094d\u092f\u0948\u0935\u0902 \u092a\u0941\u0928\u0903 \u092a\u0941\u0928\u0903 \u0964\n\u0938 \u090f\u0935 \u092e\u0941\u0915\u094d\u0924\u0903 \u0938\u094b \u0935\u093f\u0926\u094d\u0935\u093e\u0928\u094d \u0907\u0924\u093f \u0935\u0947\u0926\u093e\u0928\u094d\u0924\u0921\u093f\u0923\u094d\u0921\u093f\u092e\u0903 \u0965","ro":"aham saakshiiti yo vidyaat vivicyevam punah punah\nsa eva muktah so vidvaan iti vedaanta-dindimah","me":"One who realizes through repeated discrimination that I am the witness - that one alone is liberated. That one is the wise one. This is the drumbeat of Vedanta.","ins":"Liberation is not distant. It is recognition, repeated, deepened, stabilized. Again and again - until it becomes the ground you stand on."},{"n":19,"sk":"\u0918\u091f\u0915\u0941\u0921\u094d\u092f\u093e\u0926\u093f\u0915\u0902 \u0938\u0930\u094d\u0935\u0902 \u092e\u0943\u0924\u094d\u0924\u093f\u0915\u093e\u092e\u093e\u0924\u094d\u0930\u092e\u0947\u0935 \u091a \u0964\n\u0924\u0926\u094d\u0935\u0926\u094d \u092c\u094d\u0930\u0939\u094d\u092e \u091c\u0917\u0924\u094d \u0938\u0930\u094d\u0935\u092e\u093f\u0924\u093f \u0935\u0947\u0926\u093e\u0928\u094d\u0924\u0921\u093f\u0923\u094d\u0921\u093f\u092e\u0903 \u0965","ro":"ghatakudyaadikam sarvam mrittikaamaatrameva ca\ntadvad brahma jagat sarvamiti vedaanta-dindimah","me":"The pot, the wall, and everything else are nothing but clay. Likewise, the entire universe is nothing but Brahman. This is the drumbeat of Vedanta.","ins":"The pot and the wall appear different in name and form. But their substance is one. The many in the one."},{"n":20,"sk":"\u092c\u094d\u0930\u0939\u094d\u092e \u0938\u0924\u094d\u092f\u0902 \u091c\u0917\u0928\u094d\u092e\u093f\u0925\u094d\u092f\u093e \u091c\u0940\u0935\u094b \u092c\u094d\u0930\u0939\u094d\u092e\u0948\u0935 \u0928\u093e\u092a\u0930\u0903 \u0964\n\u0905\u0928\u0947\u0928 \u0935\u0947\u0926\u094d\u092f\u0902 \u0938\u091a\u094d\u091b\u093e\u0938\u094d\u0924\u094d\u0930\u092e\u093f\u0924\u093f \u0935\u0947\u0926\u093e\u0928\u094d\u0924\u0921\u093f\u0923\u094d\u0921\u093f\u092e\u0903 \u0965","ro":"brahma satyam jaganmithyaa jiivo brahmaiva naaparah\nanena vedyam sacchaastramiti vedaanta-dindimah","me":"Brahman is real. The universe is mithya - dependent reality. The individual soul is Brahman itself, not other. This is what true scripture reveals. This is the drumbeat of Vedanta.","ins":"Mithya is not false - it is dependent reality, like a dream real while you are in it. The jiva's separation from Brahman is the dream. This verse is the awakening."}]</script>
<script>
var V=JSON.parse(document.getElementById('vdata').textContent);
var KEY='bjm_v1';
function sok(){try{localStorage.setItem('t','1');localStorage.removeItem('t');return true;}catch(e){return false;}}
function load(){if(!sok())return null;try{var r=localStorage.getItem(KEY);if(!r)return null;var p=JSON.parse(r);if(!p||typeof p!=='object')return null;return{idx:typeof p.idx==='number'?Math.min(Math.max(Math.floor(p.idx),0),V.length):0,home:typeof p.home==='boolean'?p.home:true,ent:(p.ent&&typeof p.ent==='object')?p.ent:{},ts:typeof p.ts==='string'?p.ts:null};}catch(e){return null;}}
function save(){if(!sok())return;try{localStorage.setItem(KEY,JSON.stringify({idx:idx,home:home,ent:ent,ts:new Date().toISOString()}));}catch(e){}}
var b=load();var idx=b?b.idx:0;var home=b?b.home:true;var ent=b?b.ent:{};var ts=b?b.ts:null;
var timer=null;
function sched(){clearTimeout(timer);timer=setTimeout(flush,700);}
function flush(){var el=document.getElementById('ji');if(!el)return;var v=el.value.slice(0,20000);if(v.trim())ent[idx]=v;else delete ent[idx];ts=new Date().toISOString();save();upd();}
function cnt(){return Object.keys(ent).length;}
function upd(){var el=document.getElementById('si');if(!el)return;var c=cnt();if(c>0){var d='';try{d=new Date(ts).toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch(e){}el.textContent=c+' reflection'+(c>1?'s':'')+' saved - '+d;}else{el.textContent='';}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function exp(){var L=['Brahma Jnanavali Mala - Journal','=================================','Exported: '+new Date().toLocaleString(),''];for(var i=0;i<V.length;i++){if(!ent[i])continue;L.push('Verse '+(i+1));L.push('---------------------------------');L.push(V[i].ro.replace(/\n/g,' '));L.push('');L.push(ent[i]);L.push('');}if(L.length<=4){alert('No reflections yet.');return;}var b2=new Blob([L.join('\n')],{type:'text/plain;charset=utf-8'});var u=URL.createObjectURL(b2);var a=document.createElement('a');a.href=u;a.download='bjm-reflections.txt';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(u);a.parentNode.removeChild(a);},800);}
function clr(){if(!confirm('Clear all reflections?'))return;ent={};idx=0;home=true;ts=null;if(sok())localStorage.removeItem(KEY);render();}
function fresh(){home=false;idx=0;save();render();}
function resume(i){home=false;idx=i;save();render();}
function gohome(){flush();home=true;save();render();}
function go(i){flush();idx=i;save();render();}
function done(){flush();idx=V.length;save();render();}
function urow(){if(cnt()===0)return'';return'<div class="ur" style="margin-top:11px"><button class="bs bx" onclick="exp()">Export Journal</button><button class="bd" onclick="clr()">Clear All</button></div>';}
function rIntro(){var c=cnt();var ri=Math.min(idx,V.length-1);var back=ri>0||c>0;var h='<div class="card"><div class="om">&#2384;</div><h2>'+(back?'Welcome Back':'Begin the Reflection')+'</h2><p class="ip">The Brahma Jnanavali Mala is a garland of 20 verses by Adi Shankaracharya. Each verse is a declaration of what you already are.</p><p class="ip">Move through one verse at a time. Read. Sit. Write whatever arises.</p><div class="iq">Sakrit shravanamaatrena brahmajnanam yato bhavet - by hearing even once, the knowledge of Brahman arises.</div><div class="br">';if(ri>0){h+='<button class="bp" onclick="resume('+ri+')">Continue - Verse '+(ri+1)+'</button><button class="bs" onclick="fresh()">From Verse I</button>';}else{h+='<button class="bp" onclick="fresh()">Begin - Verse I</button>';}h+='</div>';if(c>0){var d='';try{d=new Date(ts).toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch(e){}h+='<p class="rn">'+c+' reflection'+(c>1?'s':'')+' held - '+d+'</p>';}h+=urow()+'</div>';return h;}
function rVerse(i){var v=V[i];var pct=Math.round(i/V.length*100);var skLines=v.sk.split('\n').join('<br>');var roLines=v.ro.split('\n').join('<br>');var h='<div class="pw"><div class="pb"><div class="pf" style="width:'+pct+'%"></div></div><span class="pl">Verse '+(i+1)+' of '+V.length+'</span></div>';h+='<div class="card"><div class="vt">Verse '+v.n+'</div><div class="vsk">'+skLines+'</div><div class="vro">'+roLines+'</div><div class="vdv">* * *</div><div class="vme">'+v.me+'</div><div class="vi">'+v.ins+'</div></div>';h+='<div class="card"><div class="jl">Reflection</div><textarea id="ji" rows="5" oninput="sched()">'+esc(ent[i]||'')+'</textarea><div id="si" class="si"></div></div>';h+='<div class="br">';if(i>0)h+='<button class="bs" onclick="go('+(i-1)+')">Previous</button>';if(V.length-1>i)h+='<button class="bp" onclick="go('+(i+1)+')">Next Verse</button>';else h+='<button class="bp" onclick="done()">Complete the Mala</button>';h+='<button class="bs bx ml" onclick="gohome()">Home</button>';h+='</div>';h+=urow();return h;}
function rComp(){var c=cnt();var h='<div class="card"><div class="om">&#10022;</div><h2>The Mala is Complete</h2><p>'+(c>0?c+' reflection'+(c>1?'s':'')+' in your journal.':'The garland has been offered.')+'</p><p style="font-size:13px">Brahma satyam, jaganmithya, jivo brahmaiva naparah</p><div class="br" style="justify-content:center;margin-bottom:10px"><button class="bp" onclick="fresh()">Begin Again</button>';if(c>0)h+='<button class="bs" onclick="exp()">Export Journal</button>';h+='</div>';if(c>0)h+='<div style="text-align:center"><button class="bd" onclick="clr()">Clear All</button></div>';h+='</div>';return h;}
function render(){var app=document.getElementById('app');if(!app)return;if(home){app.innerHTML=rIntro();}else if(idx>=V.length){app.innerHTML=rComp();}else{app.innerHTML=rVerse(idx);upd();window.scrollTo(0,0);}}
render();
</script>
