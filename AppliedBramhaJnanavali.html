<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brahma Jnānavalī Mālā — Reflection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment:      #f5eedc;
    --parchment-deep: #ede3c8;
    --bg:             #d4c9a8;
    --ink:            #2c1f0e;
    --ink-light:      #5a3e28;
    --ink-faint:      #8c6e4f;
    --gold:           #9a6e2a;
    --gold-light:     #c9973e;
    --border:         #c8b070;
    --red:            #8b2020;
    --shadow:         rgba(44,31,14,0.13);
    --f-display:      'Cinzel', 'Palatino Linotype', Georgia, serif;
    --f-body:         'EB Garamond', Georgia, 'Times New Roman', serif;
    --f-ui:           'Lora', Georgia, serif;
  }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { -webkit-text-size-adjust: 100%; }

body {
background-color: var(–bg);
/* Subtle gradient — no ::before pseudo-element (iOS WebKit SVG data-URI bug) */
background-image:
radial-gradient(ellipse at 20% 8%,  #caba8e 0%, transparent 52%),
radial-gradient(ellipse at 80% 92%, #bfaf85 0%, transparent 52%);
min-height: 100vh;
display: flex;
align-items: flex-start;
justify-content: center;
padding: 36px 18px 72px;
font-family: var(–f-body);
color: var(–ink);
}

.manuscript { width: 100%; max-width: 660px; }

/* ── Header ── */
.header {
text-align: center;
margin-bottom: 32px;
padding-bottom: 20px;
border-bottom: 1px solid var(–gold);
position: relative;
}
.header-fleuron {
position: absolute;
bottom: -12px; left: 50%;
transform: translateX(-50%);
background: var(–bg);
padding: 0 10px;
color: var(–gold);
font-size: 17px;
line-height: 1;
}
.eyebrow {
font-family: var(–f-ui);
font-size: 10.5px;
letter-spacing: 0.24em;
text-transform: uppercase;
color: var(–ink-faint);
margin-bottom: 8px;
}
.header h1 {
font-family: var(–f-display);
font-size: clamp(19px, 4vw, 26px);
font-weight: 500;
letter-spacing: 0.04em;
line-height: 1.3;
margin-bottom: 5px;
}
.header h1 em { color: var(–gold); font-style: normal; }
.header-sub {
font-style: italic;
font-size: 13.5px;
color: var(–ink-light);
}

/* ── Progress ── */
.progress-wrap {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 24px;
}
.progress-bar {
flex: 1; height: 3px;
background: var(–parchment-deep);
border-radius: 2px; overflow: hidden;
}
.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–gold), var(–gold-light));
border-radius: 2px;
transition: width 0.5s ease;
}
.progress-label {
font-family: var(–f-ui);
font-size: 11.5px;
color: var(–ink-faint);
white-space: nowrap;
}

/* ── Cards ── */
.card {
background: var(–parchment);
border: 1px solid var(–border);
border-radius: 2px;
box-shadow: 0 2px 6px var(–shadow), 0 8px 24px rgba(44,31,14,0.07);
position: relative;
}
/* Corner ornaments — safe pseudo-elements on the card, not body */
.card::before, .card::after {
content: ‘’;
position: absolute;
width: 22px; height: 22px;
border-color: var(–gold);
border-style: solid;
opacity: 0.4;
}
.card::before { top: 9px;    left: 9px;    border-width: 1px 0 0 1px; }
.card::after  { bottom: 9px; right: 9px;   border-width: 0 1px 1px 0; }

.verse-card {
padding: 38px 42px 34px;
margin-bottom: 22px;
animation: fadeUp 0.4s ease both;
}
.verse-tag {
font-family: var(–f-display);
font-size: 10.5px;
letter-spacing: 0.2em;
color: var(–gold);
text-transform: uppercase;
margin-bottom: 18px;
display: flex; align-items: center; gap: 10px;
}
.verse-tag::after {
content: ‘’; flex: 1; height: 1px;
background: linear-gradient(90deg, var(–gold-light), transparent);
opacity: 0.3;
}
.verse-sk {
font-family: var(–f-body);
font-size: clamp(15.5px, 2.5vw, 18.5px);
line-height: 2;
color: var(–ink);
text-align: center;
margin-bottom: 7px;
font-weight: 500;
}
.verse-ro {
font-style: italic;
font-size: 13px;
color: var(–ink-faint);
text-align: center;
margin-bottom: 20px;
line-height: 1.85;
}
.divider {
display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
}
.divider::before, .divider::after {
content: ‘’; flex: 1; height: 1px;
background: var(–gold); opacity: 0.2;
}
.divider span { color: var(–gold); font-size: 12px; opacity: 0.6; }
.verse-me {
font-size: 15px;
line-height: 1.85;
color: var(–ink-light);
margin-bottom: 15px;
}
.verse-in {
background: var(–parchment-deep);
border-left: 3px solid var(–gold);
padding: 12px 15px;
font-style: italic;
font-size: 13px;
color: var(–ink-faint);
line-height: 1.7;
border-radius: 0 2px 2px 0;
}

/* ── Journal ── */
.journal-card {
padding: 26px 42px 30px;
margin-bottom: 20px;
animation: fadeUp 0.4s 0.07s ease both;
}
.journal-label {
font-family: var(–f-display);
font-size: 10.5px;
letter-spacing: 0.18em;
color: var(–gold);
text-transform: uppercase;
margin-bottom: 13px;
}
.journal-ta {
width: 100%;
min-height: 115px;
background: transparent;
border: none;
border-bottom: 1px solid var(–border);
padding: 7px 2px;
font-family: var(–f-body);
font-size: 15.5px;
line-height: 1.85;
color: var(–ink);
resize: vertical;
outline: none;
transition: border-color 0.22s;
-webkit-appearance: none;
}
.journal-ta::placeholder { color: #b09a72; font-style: italic; }
.journal-ta:focus { border-bottom-color: var(–gold); }
.saved-ind {
margin-top: 9px;
font-family: var(–f-ui);
font-size: 11px;
color: var(–ink-faint);
font-style: italic;
min-height: 15px;
}

/* ── Buttons ── */
.btn {
font-family: var(–f-display);
font-size: 11px;
letter-spacing: 0.13em;
text-transform: uppercase;
padding: 11px 24px;
border-radius: 1px;
cursor: pointer;
transition: all 0.2s;
border: 1px solid;
-webkit-tap-highlight-color: transparent;
background: transparent;
}
.btn-primary {
background: var(–ink); color: var(–parchment); border-color: var(–ink);
}
.btn-primary:hover, .btn-primary:active {
background: var(–gold); border-color: var(–gold); color: var(–ink);
}
.btn-secondary {
color: var(–ink-faint); border-color: var(–border);
}
.btn-secondary:hover, .btn-secondary:active {
border-color: var(–gold); color: var(–gold);
}
.btn-sm   { font-size: 10.5px; padding: 8px 15px; }
.btn-danger { color: var(–red); border-color: #c47070; font-size: 10.5px; padding: 8px 15px; }
.btn-danger:hover, .btn-danger:active { border-color: var(–red); }
.btn:active { transform: scale(0.97); }

/* ── Action rows ── */
.actions {
display: flex; gap: 11px; flex-wrap: wrap; align-items: center;
margin-bottom: 12px;
animation: fadeUp 0.4s 0.13s ease both;
}
.util-row {
display: flex; gap: 10px; flex-wrap: wrap;
animation: fadeUp 0.4s 0.17s ease both;
}
.ml-auto { margin-left: auto; }

/* ── Intro ── */
.intro {
background: var(–parchment);
border: 1px solid var(–border);
border-radius: 2px;
box-shadow: 0 2px 6px var(–shadow);
padding: 44px 42px;
text-align: center;
animation: fadeUp 0.4s ease both;
}
.intro-om {
font-size: 28px; color: var(–gold);
margin-bottom: 18px; display: block;
}
.intro h2 {
font-family: var(–f-display);
font-size: 16.5px; font-weight: 400;
letter-spacing: 0.1em; color: var(–ink);
margin-bottom: 16px;
}
.intro p {
font-size: 15px; line-height: 1.85;
color: var(–ink-light); margin-bottom: 11px;
text-align: left;
}
.intro-quote {
font-style: italic; font-size: 13.5px; color: var(–ink-faint);
border-left: 3px solid var(–gold);
padding: 10px 15px; text-align: left;
margin: 16px 0 26px; line-height: 1.7;
}
.btn-row {
display: flex; gap: 11px; flex-wrap: wrap;
justify-content: center; margin-bottom: 6px;
}
.resume-note {
font-family: var(–f-ui); font-size: 11.5px;
color: var(–ink-faint); font-style: italic;
margin-top: 13px;
}
.intro-util {
display: flex; gap: 10px; flex-wrap: wrap;
justify-content: center; margin-top: 16px;
}

/* ── Completion ── */
.completion {
background: var(–parchment);
border: 1px solid var(–border);
border-radius: 2px;
box-shadow: 0 2px 6px var(–shadow);
padding: 52px 42px;
text-align: center;
animation: fadeUp 0.45s ease both;
}
.comp-star { font-size: 30px; color: var(–gold); margin-bottom: 16px; }
.completion h2 {
font-family: var(–f-display);
font-size: 19px; font-weight: 400;
letter-spacing: 0.06em; color: var(–ink);
margin-bottom: 13px;
}
.completion p {
font-style: italic; font-size: 14.5px;
color: var(–ink-faint); line-height: 1.8;
max-width: 390px; margin: 0 auto 22px;
}
.comp-maha {
font-size: 13px; color: var(–ink-faint); margin-bottom: 26px;
}

/* ── Animation ── */
@keyframes fadeUp {
from { opacity: 0; transform: translateY(9px); }
to   { opacity: 1; transform: translateY(0); }
}

/* ── Mobile ── */
@media (max-width: 540px) {
body { padding: 20px 12px 60px; }
.verse-card, .journal-card, .intro, .completion { padding: 22px 18px; }
.actions { flex-direction: column; }
.actions .ml-auto { margin-left: 0; }
.btn { width: 100%; text-align: center; }
.btn-sm, .btn-danger { width: auto; }
.util-row, .intro-util, .btn-row { flex-direction: column; align-items: stretch; }
}
</style>

</head>
<body>
<div class="manuscript">

  <div class="header">
    <div class="eyebrow">Adi Shankaracharya</div>
    <h1>Brahma Jnānavalī <em>Mālā</em></h1>
    <div class="header-sub">A Garland of the Knowledge of Brahman</div>
    <span class="header-fleuron">❧</span>
  </div>

  <div id="app"></div>

</div>
<script>
// ─────────────────────────────
//  VERSE DATA
// ─────────────────────────────
const V = [
  { n:1,
    sk:"सकृत् श्रवणमात्रेण ब्रह्मज्ञानं यतो भवेत् ।\nब्रह्मज्ञानावलीमाला सर्वेषां मोक्षसिद्धये ॥",
    ro:"sakṛt śravaṇamātreṇa brahmajñānaṃ yato bhavet\nbrahmajñānāvalīmālā sarveshāṃ mokṣasiddhaye",
    me:"This garland of the knowledge of Brahman, by hearing which just once the knowledge of Brahman is attained, is offered for the liberation of all.",
    ins:"This is not a text to be studied — it is a text to be heard inwardly. Even once. The promise is built into the opening." },
  { n:2,
    sk:"असङ्गोऽहमसङ्गोऽहमसङ्गोऽहं पुनः पुनः ।\nसच्चिदानन्दरूपोऽहमहमेवाहमव्ययः ॥",
    ro:"asaṅgo'ham asaṅgo'ham asaṅgo'haṃ punaḥ punaḥ\nsaccidānandarūpo'ham ahamevāham avyayaḥ",
    me:"Unattached am I, unattached am I, unattached am I — again and again. I am of the nature of Existence-Consciousness-Bliss. I am the very Self, indestructible and ever unchanging.",
    ins:"The triple repetition is not poetic decoration — it is the method itself. The mind needs to hear the truth three times before it loosens its grip on the false." },
  { n:3,
    sk:"नित्यशुद्धविमुक्तोऽहं निराकारोऽहमव्ययः ।\nभूमानन्दस्वरूपोऽहमहमेवाहमव्ययः ॥",
    ro:"nityaśuddhavimukto'haṃ nirākāro'ham avyayaḥ\nbhūmānandasvarūpo'haṃ ahamevāham avyayaḥ",
    me:"I am eternally pure, I am liberated, I am formless, I am indestructible. I am of the nature of infinite, boundless bliss. I am the very Self, indestructible and changeless.",
    ins:"Purity here is not moral — it is ontological. Not 'I have become pure' but 'I am, by nature, never impure.' The liberation is not future — it is a recognition of what already is." },
  { n:4,
    sk:"विज्ञानघनरूपोऽहं चिदाकाशोऽहमव्ययः ।\nकेवलानन्दरूपोऽहमहमेवाहमव्ययः ॥",
    ro:"vijñānaghanarūpo'haṃ cidākāśo'ham avyayaḥ\nkevalānandarūpo'haṃ ahamevāham avyayaḥ",
    me:"I am of the nature of dense, solid awareness. I am the sky of consciousness, indestructible. I am pure, unconditioned bliss. I am the very Self, indestructible and changeless.",
    ins:"Cidākāśa — the sky of consciousness — nothing sticks to it. Clouds pass. The sky remains. You are the sky, not the cloud." },
  { n:5,
    sk:"नित्यानन्दस्वरूपोऽहं परमानन्दरूपधृक् ।\nमुक्तानन्दस्वरूपोऽहमहमेवाहमव्ययः ॥",
    ro:"nityānandasvarūpo'haṃ paramānandarūpadhṛk\nmuktānandasvarūpo'haṃ ahamevāham avyayaḥ",
    me:"I am of the nature of eternal bliss. I am the bearer of the form of supreme bliss. I am the bliss of liberation. I am the very Self, indestructible and changeless.",
    ins:"Three flavors of ānanda in one verse: nitya (eternal), parama (supreme), mukta (free). Shankara is not repeating — he is descending, like three steps into the same ocean." },
  { n:6,
    sk:"सत्स्वरूपोऽहमित्येवं यः करोति सदा जपम् ।\nभवपाशविनिर्मुक्तः स याति परमां गतिम् ॥",
    ro:"satsvarūpo'ham ityevaṃ yaḥ karoti sadā japam\nbhavapāśavinirmuktaḥ sa yāti paramāṃ gatim",
    me:"One who constantly repeats as japa 'I am of the nature of pure existence' — freed from the bonds of worldly existence, that one attains the supreme state.",
    ins:"The japa is not a request to become. It is a remembering of what you already are. The repetition wears down the false, not builds the true." },
  { n:7,
    sk:"अहमेव परं ब्रह्म अहमेव परं पदम् ।\nअहमेवाहमेवाहमहमेवाहमव्ययः ॥",
    ro:"ahameva paraṃ brahma ahameva paraṃ padam\nahamevāhamevāhaṃ ahamevāham avyayaḥ",
    me:"I alone am the supreme Brahman. I alone am the supreme state. I am, I am, I am — I am the very Self, indestructible and changeless.",
    ins:"The 'I' speaking here is not the ego. The ego cannot say 'I am Brahman' truthfully. Only Brahman can say it. To realize this verse is to realize who is speaking." },
  { n:8,
    sk:"अन्तरात्मस्वरूपोऽहं प्रत्यगात्मस्वरूपधृक् ।\nशुद्धचैतन्यरूपोऽहमहमेवाहमव्ययः ॥",
    ro:"antarātmasvarūpo'haṃ pratyagātmasvarūpadhṛk\nśuddhacaitanyarūpo'haṃ ahamevāham avyayaḥ",
    me:"I am the inner Self. I am the bearer of the form of the innermost Self, the awareness that turns back inward. I am pure consciousness itself. I am the very Self, indestructible and changeless.",
    ins:"Pratyagātman — the Self that faces inward, toward its own source, against the outward current of the senses. This is the direction of self-inquiry." },
  { n:9,
    sk:"आत्मज्ञानप्रकाशोऽहं सत्तामात्रस्वरूपधृक् ।\nआनन्दामृतरूपोऽहमहमेवाहमव्ययः ॥",
    ro:"ātmajñānaprakāśo'haṃ sattāmātrasvarūpadhṛk\nānandāmṛtarūpo'haṃ ahamevāham avyayaḥ",
    me:"I am the luminosity of Self-knowledge. I am pure being itself. I am the immortal nectar of bliss. I am the very Self, indestructible and changeless.",
    ins:"Light needs no source to illuminate itself. The Self is self-luminous — it does not require another awareness to know it. This is what makes Advaita's position radical." },
  { n:10,
    sk:"गुणत्रयव्यतीतोऽहं ब्रह्मादीनां च साक्ष्यहम् ।\nअनन्तानन्दरूपोऽहमहमेवाहमव्ययः ॥",
    ro:"guṇatrayavyatīto'haṃ brahmādīnāṃ ca sākṣyaham\nanantānandarūpo'haṃ ahamevāham avyayaḥ",
    me:"I am beyond the three guṇas — sattva, rajas, and tamas. I am the witness of even Brahmā and others. I am of the nature of infinite bliss. I am the very Self, indestructible and changeless.",
    ins:"Not even Brahmā, the creator, is the ultimate witness — the Self witnesses all creative power itself. This is a staggering ontological claim, delivered quietly." },
  { n:11,
    sk:"अन्तर्यामिस्वरूपोऽहं कूटस्थः सर्वगोऽस्म्यहम् ।\nपरमात्मस्वरूपोऽहमहमेवाहमव्ययः ॥",
    ro:"antaryāmisvarūpo'haṃ kūṭasthaḥ sarvago'smyaham\nparamātmasvarūpo'haṃ ahamevāham avyayaḥ",
    me:"I am the inner controller. I am immutable, the unchanging anvil. I am all-pervading. I am myself the supreme Self. I am the very Self, indestructible and changeless.",
    ins:"Kūṭastha — literally 'standing at the top of the anvil' — what strikes all things without being struck itself. The deepest stillness in the midst of all movement." },
  { n:12,
    sk:"निष्कलोऽहं निष्क्रियोऽहं सर्वात्मा आद्यः सनातनः ।\nअपरोक्षस्वरूपोऽहमहमेवाहमव्ययः ॥",
    ro:"niṣkalo'haṃ niṣkriyo'haṃ sarvātmā ādyaḥ sanātanaḥ\naparokṣasvarūpo'haṃ ahamevāham avyayaḥ",
    me:"I am without parts. I am actionless. I am the self of all, the primordial, the ancient, the eternal. I am the directly intuited Self — not known through inference but directly. I am the very Self, indestructible and changeless.",
    ins:"Aparokṣa — not mediated, not inferred, not heard about. The Self is the only knowledge that is its own object. All other knowledge is indirect." },
  { n:13,
    sk:"द्वन्द्वादिसाक्षिरूपोऽहमचलोऽहं सनातनः ।\nसर्वसाक्षिस्वरूपोऽहमहमेवाहमव्ययः ॥",
    ro:"dvandvādisākṣirūpo'haṃ acalo'haṃ sanātanaḥ\nsarvasākṣisvarūpo'haṃ ahamevāham avyayaḥ",
    me:"I am the witness of all pairs of opposites — pleasure and pain, heat and cold. I am immovable. I am eternal. I am the witness of everything. I am the very Self, indestructible and changeless.",
    ins:"Dvandva — the pairs. The Self does not choose between opposites. It witnesses both. This is the root of equanimity — not the resolution of opposites, but the recognition of what stands behind them both." },
  { n:14,
    sk:"अकर्तृस्वरूपोऽहमभोक्तृस्वरूपधृक् ।\nकेवलस्वप्रकाशोऽहमहमेवाहमव्ययः ॥",
    ro:"akartṛsvarūpo'haṃ abhoktṛsvarūpadhṛk\nkevalasvaprākāśo'haṃ ahamevāham avyayaḥ",
    me:"I am not a doer. I am not an experiencer. I am pure self-luminosity alone. I am the very Self, indestructible and changeless.",
    ins:"The deepest paradox: the one reading this is told they are neither doing the reading nor experiencing it. And yet — there is awareness of both. That awareness is what is being pointed to." },
  { n:15,
    sk:"निराधारस्वरूपोऽहं सर्वाधारोऽहमेव च ।\nआप्तकामस्वरूपोऽहमहमेवाहमव्ययः ॥",
    ro:"nirādhārasvarūpo'haṃ sarvādhāro'hameva ca\nāptakāmasvarūpo'haṃ ahamevāham avyayaḥ",
    me:"I am without any support, and I am the support of all. I have no desires yet to be fulfilled. I am the very Self, indestructible and changeless.",
    ins:"Both at once: the unsupported and the support of all. The desire-less and the fulfillment of all desire. Advaita holds contradiction not by resolving it, but by finding the level at which it dissolves." },
  { n:16,
    sk:"तापत्रयविनिर्मुक्तो देहत्रयविलक्षणः ।\nअवस्थात्रयसाक्ष्यस्मि चाहमेवाहमव्ययः ॥",
    ro:"tāpatrayavinirmukto dehatrayavilakṣaṇaḥ\navasthātrayasākṣyasmi cāhamevāham avyayaḥ",
    me:"I am free from the threefold afflictions. I am distinct from the three bodies — gross, subtle, causal. I am the witness of the three states — waking, dream, and deep sleep. I am the very Self, indestructible and changeless.",
    ins:"Three threes: three afflictions, three bodies, three states — and in all of them, the same witness remains. The common thread across all conditions is the 'I' that notices them." },
  { n:17,

    ro:"dṛgdṛśyau dvau padārthau staḥ parasparavilakṣaṇau\ndṛgbrahma dṛśyaṃ māyeti sarvavedāntaḍiṇḍimaḥ",
    me:"There are two things entirely different from each other: the seer and the seen. The seer is Brahman; the seen is Māyā. This is the drumbeat of all Vedanta.",

    sk:"अहं साक्षीति यो विद्यात् विविच्यैवं पुनः पुनः ।\nस एव मुक्तः सो विद्वान् इति वेदान्तडिण्डिमः ॥",
    ro:"ahaṃ sākṣīti yo vidyāt vivicyevaṃ punaḥ punaḥ\nsa eva muktaḥ so vidvān iti vedāntaḍiṇḍimaḥ",

  { n:19,
    sk:"घटकुड्यादिकं सर्वं मृत्तिकामात्रमेव च ।\nतद्वद् ब्रह्म जगत् सर्वमिति वेदान्तडिण्डिमः ॥",
    ro:"ghaṭakuḍyādikaṃ sarvaṃ mṛttikāmātrameva ca\ntadvad brahma jagat sarvamiti vedāntaḍiṇḍimaḥ",
    me:"The pot, the wall, and everything else are nothing but clay. Likewise, the entire universe is nothing but Brahman. This is the drumbeat of Vedanta.",
    ins:"The pot and the wall appear different. In name and form, yes. But their substance is one. The universe and Brahman — same logic. The many in the one." },
  { n:20,
    sk:"ब्रह्म सत्यं जगन्मिथ्या जीवो ब्रह्मैव नापरः ।\nअनेन वेद्यं सच्छास्त्रमिति वेदान्तडिण्डिमः ॥",
    ro:"brahma satyaṃ jaganmithyā jīvo brahmaiva nāparaḥ\nanena vedyaṃ sacchāstramiti vedāntaḍiṇḍimaḥ",
    me:"Brahman is real. The universe is mithyā — neither real nor unreal, but dependent. The individual soul is Brahman itself — not other. This is what true scripture reveals. This is the drumbeat of Vedanta.",
    ins:"The mahāvākya in summary form. Mithyā is not 'false' — it is 'dependent reality,' like a dream that is real while you are in it. The jīva's separation from Brahman is the dream. This verse is the awakening." }
];

// ─────────────────────────────
//  STORAGE
// ─────────────────────────────
const KEY     = ‘bjm_v1’;
const MAX_CH  = 20000;

function storeOK() {
try { const k=’**p**’; localStorage.setItem(k,k); localStorage.removeItem(k); return true; }
catch { return false; }
}
function load() {
if (!storeOK()) return null;
try {
const r = localStorage.getItem(KEY);
if (!r) return null;
const p = JSON.parse(r);
if (typeof p !== ‘object’ || !p) return null;
return {
idx:  Number.isInteger(p.idx) ? Math.min(Math.max(p.idx,0), V.length) : 0,
home: typeof p.home===‘boolean’ ? p.home : true,
ent:  (typeof p.ent===‘object’ && p.ent) ? p.ent : {},
ts:   typeof p.ts===‘string’ ? p.ts : null
};
} catch { return null; }
}
function save() {
if (!storeOK()) return;
try { localStorage.setItem(KEY, JSON.stringify({ idx, home, ent, ts: new Date().toISOString() })); }
catch(e) { console.warn(‘BJM save failed’,e); }
}
function purge() {
if (storeOK()) localStorage.removeItem(KEY);
}
function esc(s) {
return s.replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’);
}
function trim(s) { return s.replace(/\0/g,’’).slice(0, MAX_CH); }
function fmtTs(iso) {
if (!iso) return ‘’;
try { return new Date(iso).toLocaleString(undefined,{month:‘short’,day:‘numeric’,hour:‘2-digit’,minute:‘2-digit’}); }
catch { return ‘’; }
}

// ─────────────────────────────
//  STATE
// ─────────────────────────────
const b = load();
let idx  = b ? b.idx  : 0;
let home = b ? b.home : true;
let ent  = b ? b.ent  : {};
let ts   = b ? b.ts   : null;

let autoTimer = null;
function schedAutosave() {
clearTimeout(autoTimer);
autoTimer = setTimeout(flush, 700);
}
function flush() {
const el = document.getElementById(‘ji’);
if (!el) return;
const v = trim(el.value);
if (v) ent[idx] = v; else delete ent[idx];
ts = new Date().toISOString();
save();
refreshInd();
}
function cnt() { return Object.keys(ent).length; }
function refreshInd() {
const el = document.getElementById(‘si’);
if (!el) return;
const c = cnt();
el.textContent = c > 0 ? `${c} reflection${c>1?'s':''} saved · ${fmtTs(ts)}` : ‘’;
}

// ─────────────────────────────
//  EXPORT
// ─────────────────────────────
function exportJ() {
const lines = [
‘Brahma Jnānavalī Mālā — Personal Reflection Journal’,
‘══════════════════════════════════════════════════════’,
‘Exported: ’ + new Date().toLocaleString(), ‘’
];
V.forEach((v,i) => {
if (!ent[i]) return;
lines.push(‘Verse ‘+v.n);
lines.push(‘──────────────────────────────────────────────────────’);
lines.push(v.ro.replace(/\n/g,’ ‘)); lines.push(’’);
lines.push(ent[i]); lines.push(’’);
});
if (lines.length <= 4) { alert(‘No reflections to export yet.’); return; }
const blob = new Blob([lines.join(’\n’)],{type:‘text/plain;charset=utf-8’});
const url  = URL.createObjectURL(blob);
const a    = Object.assign(document.createElement(‘a’),{href:url,download:‘brahma-jnanavali-reflections.txt’});
document.body.appendChild(a); a.click();
setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 800);
}

// ─────────────────────────────
//  CLEAR
// ─────────────────────────────
function clearAll() {
if (!confirm(‘Clear all reflections and begin fresh?\n\nThis cannot be undone.’)) return;
ent={}; idx=0; home=true; ts=null; purge(); render();
}

// ─────────────────────────────
//  UTILITY ROW
// ─────────────────────────────
function utilRow() {
if (cnt()===0) return ‘’;
return `<div class="util-row">
<button class="btn btn-secondary btn-sm" onclick="exportJ()">Export Journal ↓</button>
<button class="btn btn-danger" onclick="clearAll()">Clear All</button>

  </div>`;
}

// ─────────────────────────────
//  SCREENS
// ─────────────────────────────
function rIntro() {
const c  = cnt();
const ri = Math.min(idx, V.length-1);
const hasProgress = ri > 0 || c > 0;
return `<div class="intro"> <span class="intro-om">ॐ</span> <h2>${hasProgress ? 'Welcome Back' : 'Begin the Reflection'}</h2> <p>The <em>Brahma Jnānavalī Mālā</em> is a garland of 20 verses composed by Adi Shankaracharya. Each verse is an assertion — not a prayer, not a petition — but a declaration of what you already are.</p> <p>This is not a study exercise. It is an <em>abhyāsa</em> — a practice of inward repetition. Move through one verse at a time. Read. Sit. Write whatever arises.</p> <div class="intro-quote"> "Sakṛt śravaṇamātreṇa brahmajñānaṃ yato bhavet" —<br> By hearing even once, the knowledge of Brahman arises. </div> <div class="btn-row"> ${ri > 0 ? `<button class="btn btn-primary" onclick="resumeAt(${ri})">Continue — Verse ${ri+1}</button>
<button class="btn btn-secondary" onclick="fresh()">From Verse I</button>`:`<button class="btn btn-primary" onclick="fresh()">Begin — Verse I</button>`} </div> ${c>0 ? `<p class="resume-note">${c} reflection${c>1?‘s’:’’} held · ${fmtTs(ts)}</p>` : ‘’}
${utilRow()}

  </div>`;
}

function rVerse(i) {
const v   = V[i];
const pct = Math.round((i/V.length)*100);
return `<div class="progress-wrap"> <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div> <span class="progress-label">Verse ${i+1} of ${V.length}</span> </div> <div class="card verse-card"> <div class="verse-tag">Verse ${v.n} &nbsp;·&nbsp; ब्रह्मज्ञानावलीमाला</div> <div class="verse-sk">${v.sk.replace(/\n/g,'<br>')}</div> <div class="verse-ro">${v.ro.replace(/\n/g,'<br>')}</div> <div class="divider"><span>✦</span></div> <div class="verse-me">${v.me}</div> <div class="verse-in">${v.ins}</div> </div> <div class="card journal-card"> <div class="journal-label">Reflection</div> <textarea id="ji" class="journal-ta" placeholder="Write whatever arises — no right answer, no performance..." rows="6" oninput="schedAutosave()" >${esc(ent[i]||'')}</textarea> <div id="si" class="saved-ind"></div> </div> <div class="actions"> ${i>0 ?`<button class="btn btn-secondary" onclick="go(${i-1})">← Previous</button>`: ''} ${i<V.length-1 ?`<button class="btn btn-primary" onclick="go(${i+1})">Next Verse →</button>`:`<button class="btn btn-primary" onclick="finish()">Complete the Mālā ✦</button>`} <button class="btn btn-secondary btn-sm ml-auto" onclick="goHome()">⌂ Home</button> </div> ${utilRow()}`;
}

function rCompletion() {
const c = cnt();
return `<div class="completion"> <div class="comp-star">✦</div> <h2>The Mālā is Complete</h2> <p>${c>0 ? `${c} reflection${c>1?‘s’:’’} now live in your journal.`: 'The garland has been offered.'}</p> <div class="comp-maha"> <em>"Brahma satyaṃ jaganmithyā jīvo brahmaiva nāparaḥ"</em><br> Brahman is real. The universe is appearance. The self is Brahman alone. </div> <div class="btn-row" style="margin-bottom:14px"> <button class="btn btn-primary" onclick="fresh()">Begin Again</button> ${c>0 ?`<button class="btn btn-secondary" onclick="exportJ()">Export Journal ↓</button>`: ''} </div> ${c>0 ?`<button class="btn btn-danger" onclick="clearAll()">Clear All Reflections</button>` : ‘’}

  </div>`;
}

// ─────────────────────────────
//  NAVIGATION
// ─────────────────────────────
function render() {
const app = document.getElementById(‘app’);
if (!app) return;
if (home) {
app.innerHTML = rIntro();
} else if (idx >= V.length) {
app.innerHTML = rCompletion();
} else {
app.innerHTML = rVerse(idx);
refreshInd();
window.scrollTo({top:0, behavior:‘smooth’});
}
}

function fresh()       { home=false; idx=0; save(); render(); }
function resumeAt(i)   { home=false; idx=i; save(); render(); }
function goHome()      { flush(); home=true; save(); render(); }
function go(i)         { flush(); idx=i; save(); render(); }
function finish()      { flush(); idx=V.length; save(); render(); }

render();
</script>

</body>
</html>
