<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brahma Jn&#257;naval&#299; M&#257;l&#257; &#8212; Reflection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment:      #f5eedc;
    --parchment-deep: #ede3c8;
    --bg:             #d4c9a8;
    --ink:            #2c1f0e;
    --ink-light:      #5a3e28;
    --ink-faint:      #8c6e4f;
    --gold:           #9a6e2a;
    --gold-light:     #c9973e;
    --border:         #c8b070;
    --red:            #8b2020;
    --shadow:         rgba(44,31,14,0.13);
    --f-display:      'Cinzel', 'Palatino Linotype', Georgia, serif;
    --f-body:         'EB Garamond', Georgia, 'Times New Roman', serif;
    --f-ui:           'Lora', Georgia, serif;
  }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { -webkit-text-size-adjust: 100%; }

body {
background-color: var(–bg);
/* Subtle gradient — no ::before pseudo-element (iOS WebKit SVG data-URI bug) */
background-image:
radial-gradient(ellipse at 20% 8%,  #caba8e 0%, transparent 52%),
radial-gradient(ellipse at 80% 92%, #bfaf85 0%, transparent 52%);
min-height: 100vh;
display: flex;
align-items: flex-start;
justify-content: center;
padding: 36px 18px 72px;
font-family: var(–f-body);
color: var(–ink);
}

.manuscript { width: 100%; max-width: 660px; }

/* ── Header ── */
.header {
text-align: center;
margin-bottom: 32px;
padding-bottom: 20px;
border-bottom: 1px solid var(–gold);
position: relative;
}
.header-fleuron {
position: absolute;
bottom: -12px; left: 50%;
transform: translateX(-50%);
background: var(–bg);
padding: 0 10px;
color: var(–gold);
font-size: 17px;
line-height: 1;
}
.eyebrow {
font-family: var(–f-ui);
font-size: 10.5px;
letter-spacing: 0.24em;
text-transform: uppercase;
color: var(–ink-faint);
margin-bottom: 8px;
}
.header h1 {
font-family: var(–f-display);
font-size: clamp(19px, 4vw, 26px);
font-weight: 500;
letter-spacing: 0.04em;
line-height: 1.3;
margin-bottom: 5px;
}
.header h1 em { color: var(–gold); font-style: normal; }
.header-sub {
font-style: italic;
font-size: 13.5px;
color: var(–ink-light);
}

/* ── Progress ── */
.progress-wrap {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 24px;
}
.progress-bar {
flex: 1; height: 3px;
background: var(–parchment-deep);
border-radius: 2px; overflow: hidden;
}
.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–gold), var(–gold-light));
border-radius: 2px;
transition: width 0.5s ease;
}
.progress-label {
font-family: var(–f-ui);
font-size: 11.5px;
color: var(–ink-faint);
white-space: nowrap;
}

/* ── Cards ── */
.card {
background: var(–parchment);
border: 1px solid var(–border);
border-radius: 2px;
box-shadow: 0 2px 6px var(–shadow), 0 8px 24px rgba(44,31,14,0.07);
position: relative;
}
/* Corner ornaments — safe pseudo-elements on the card, not body */
.card::before, .card::after {
content: ‘’;
position: absolute;
width: 22px; height: 22px;
border-color: var(–gold);
border-style: solid;
opacity: 0.4;
}
.card::before { top: 9px;    left: 9px;    border-width: 1px 0 0 1px; }
.card::after  { bottom: 9px; right: 9px;   border-width: 0 1px 1px 0; }

.verse-card {
padding: 38px 42px 34px;
margin-bottom: 22px;
animation: fadeUp 0.4s ease both;
}
.verse-tag {
font-family: var(–f-display);
font-size: 10.5px;
letter-spacing: 0.2em;
color: var(–gold);
text-transform: uppercase;
margin-bottom: 18px;
display: flex; align-items: center; gap: 10px;
}
.verse-tag::after {
content: ‘’; flex: 1; height: 1px;
background: linear-gradient(90deg, var(–gold-light), transparent);
opacity: 0.3;
}
.verse-sk {
font-family: var(–f-body);
font-size: clamp(15.5px, 2.5vw, 18.5px);
line-height: 2;
color: var(–ink);
text-align: center;
margin-bottom: 7px;
font-weight: 500;
}
.verse-ro {
font-style: italic;
font-size: 13px;
color: var(–ink-faint);
text-align: center;
margin-bottom: 20px;
line-height: 1.85;
}
.divider {
display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
}
.divider::before, .divider::after {
content: ‘’; flex: 1; height: 1px;
background: var(–gold); opacity: 0.2;
}
.divider span { color: var(–gold); font-size: 12px; opacity: 0.6; }
.verse-me {
font-size: 15px;
line-height: 1.85;
color: var(–ink-light);
margin-bottom: 15px;
}
.verse-in {
background: var(–parchment-deep);
border-left: 3px solid var(–gold);
padding: 12px 15px;
font-style: italic;
font-size: 13px;
color: var(–ink-faint);
line-height: 1.7;
border-radius: 0 2px 2px 0;
}

/* ── Journal ── */
.journal-card {
padding: 26px 42px 30px;
margin-bottom: 20px;
animation: fadeUp 0.4s 0.07s ease both;
}
.journal-label {
font-family: var(–f-display);
font-size: 10.5px;
letter-spacing: 0.18em;
color: var(–gold);
text-transform: uppercase;
margin-bottom: 13px;
}
.journal-ta {
width: 100%;
min-height: 115px;
background: transparent;
border: none;
border-bottom: 1px solid var(–border);
padding: 7px 2px;
font-family: var(–f-body);
font-size: 15.5px;
line-height: 1.85;
color: var(–ink);
resize: vertical;
outline: none;
transition: border-color 0.22s;
-webkit-appearance: none;
}
.journal-ta::placeholder { color: #b09a72; font-style: italic; }
.journal-ta:focus { border-bottom-color: var(–gold); }
.saved-ind {
margin-top: 9px;
font-family: var(–f-ui);
font-size: 11px;
color: var(–ink-faint);
font-style: italic;
min-height: 15px;
}

/* ── Buttons ── */
.btn {
font-family: var(–f-display);
font-size: 11px;
letter-spacing: 0.13em;
text-transform: uppercase;
padding: 11px 24px;
border-radius: 1px;
cursor: pointer;
transition: all 0.2s;
border: 1px solid;
-webkit-tap-highlight-color: transparent;
background: transparent;
}
.btn-primary {
background: var(–ink); color: var(–parchment); border-color: var(–ink);
}
.btn-primary:hover, .btn-primary:active {
background: var(–gold); border-color: var(–gold); color: var(–ink);
}
.btn-secondary {
color: var(–ink-faint); border-color: var(–border);
}
.btn-secondary:hover, .btn-secondary:active {
border-color: var(–gold); color: var(–gold);
}
.btn-sm   { font-size: 10.5px; padding: 8px 15px; }
.btn-danger { color: var(–red); border-color: #c47070; font-size: 10.5px; padding: 8px 15px; }
.btn-danger:hover, .btn-danger:active { border-color: var(–red); }
.btn:active { transform: scale(0.97); }

/* ── Action rows ── */
.actions {
display: flex; gap: 11px; flex-wrap: wrap; align-items: center;
margin-bottom: 12px;
animation: fadeUp 0.4s 0.13s ease both;
}
.util-row {
display: flex; gap: 10px; flex-wrap: wrap;
animation: fadeUp 0.4s 0.17s ease both;
}
.ml-auto { margin-left: auto; }

/* ── Intro ── */
.intro {
background: var(–parchment);
border: 1px solid var(–border);
border-radius: 2px;
box-shadow: 0 2px 6px var(–shadow);
padding: 44px 42px;
text-align: center;
animation: fadeUp 0.4s ease both;
}
.intro-om {
font-size: 28px; color: var(–gold);
margin-bottom: 18px; display: block;
}
.intro h2 {
font-family: var(–f-display);
font-size: 16.5px; font-weight: 400;
letter-spacing: 0.1em; color: var(–ink);
margin-bottom: 16px;
}
.intro p {
font-size: 15px; line-height: 1.85;
color: var(–ink-light); margin-bottom: 11px;
text-align: left;
}
.intro-quote {
font-style: italic; font-size: 13.5px; color: var(–ink-faint);
border-left: 3px solid var(–gold);
padding: 10px 15px; text-align: left;
margin: 16px 0 26px; line-height: 1.7;
}
.btn-row {
display: flex; gap: 11px; flex-wrap: wrap;
justify-content: center; margin-bottom: 6px;
}
.resume-note {
font-family: var(–f-ui); font-size: 11.5px;
color: var(–ink-faint); font-style: italic;
margin-top: 13px;
}
.intro-util {
display: flex; gap: 10px; flex-wrap: wrap;
justify-content: center; margin-top: 16px;
}

/* ── Completion ── */
.completion {
background: var(–parchment);
border: 1px solid var(–border);
border-radius: 2px;
box-shadow: 0 2px 6px var(–shadow);
padding: 52px 42px;
text-align: center;
animation: fadeUp 0.45s ease both;
}
.comp-star { font-size: 30px; color: var(–gold); margin-bottom: 16px; }
.completion h2 {
font-family: var(–f-display);
font-size: 19px; font-weight: 400;
letter-spacing: 0.06em; color: var(–ink);
margin-bottom: 13px;
}
.completion p {
font-style: italic; font-size: 14.5px;
color: var(–ink-faint); line-height: 1.8;
max-width: 390px; margin: 0 auto 22px;
}
.comp-maha {
font-size: 13px; color: var(–ink-faint); margin-bottom: 26px;
}

/* ── Animation ── */
@keyframes fadeUp {
from { opacity: 0; transform: translateY(9px); }
to   { opacity: 1; transform: translateY(0); }
}

/* ── Mobile ── */
@media (max-width: 540px) {
body { padding: 20px 12px 60px; }
.verse-card, .journal-card, .intro, .completion { padding: 22px 18px; }
.actions { flex-direction: column; }
.actions .ml-auto { margin-left: 0; }
.btn { width: 100%; text-align: center; }
.btn-sm, .btn-danger { width: auto; }
.util-row, .intro-util, .btn-row { flex-direction: column; align-items: stretch; }
}
</style>

</head>
<body>
<div class="manuscript">

  <div class="header">
    <div class="eyebrow">Adi Shankaracharya</div>
    <h1>Brahma Jn&#257;naval&#299; <em>M&#257;l&#257;</em></h1>
    <div class="header-sub">A Garland of the Knowledge of Brahman</div>
    <span class="header-fleuron">&#10087;</span>
  </div>

  <div id="app"></div>

</div>
<script>
// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
//  VERSE DATA
// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const V = [
  { n:1,
    sk:"\u0938\u0915\u0943\u0924\u094d \u0936\u094d\u0930\u0935\u0923\u092e\u093e\u0924\u094d\u0930\u0947\u0923 \u092c\u094d\u0930\u0939\u094d\u092e\u091c\u094d\u091e\u093e\u0928\u0902 \u092f\u0924\u094b \u092d\u0935\u0947\u0924\u094d \u0964\n\u092c\u094d\u0930\u0939\u094d\u092e\u091c\u094d\u091e\u093e\u0928\u093e\u0935\u0932\u0940\u092e\u093e\u0932\u093e \u0938\u0930\u094d\u0935\u0947\u0937\u093e\u0902 \u092e\u094b\u0915\u094d\u0937\u0938\u093f\u0926\u094d\u0927\u092f\u0947 \u0965",
    ro:"sak\u1e5bt \u015brava\u1e47am\u0101tre\u1e47a brahmaj\u00f1\u0101na\u1e43 yato bhavet\nbrahmaj\u00f1\u0101n\u0101val\u012bm\u0101l\u0101 sarvesh\u0101\u1e43 mok\u1e63asiddhaye",
    me:"This garland of the knowledge of Brahman, by hearing which just once the knowledge of Brahman is attained, is offered for the liberation of all.",
    ins:"This is not a text to be studied \u2014 it is a text to be heard inwardly. Even once. The promise is built into the opening." },
  { n:2,
    sk:"\u0905\u0938\u0919\u094d\u0917\u094b\u093d\u0939\u092e\u0938\u0919\u094d\u0917\u094b\u093d\u0939\u092e\u0938\u0919\u094d\u0917\u094b\u093d\u0939\u0902 \u092a\u0941\u0928\u0903 \u092a\u0941\u0928\u0903 \u0964\n\u0938\u091a\u094d\u091a\u093f\u0926\u093e\u0928\u0928\u094d\u0926\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965",
    ro:"asa\u1e45go'ham asa\u1e45go'ham asa\u1e45go'ha\u1e43 puna\u1e25 puna\u1e25\nsaccid\u0101nandar\u016bpo'ham ahamev\u0101ham avyaya\u1e25",
    me:"Unattached am I, unattached am I, unattached am I \u2014 again and again. I am of the nature of Existence-Consciousness-Bliss. I am the very Self, indestructible and ever unchanging.",
    ins:"The triple repetition is not poetic decoration \u2014 it is the method itself. The mind needs to hear the truth three times before it loosens its grip on the false." },
  { n:3,
    sk:"\u0928\u093f\u0924\u094d\u092f\u0936\u0941\u0926\u094d\u0927\u0935\u093f\u092e\u0941\u0915\u094d\u0924\u094b\u093d\u0939\u0902 \u0928\u093f\u0930\u093e\u0915\u093e\u0930\u094b\u093d\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0964\n\u092d\u0942\u092e\u093e\u0928\u0928\u094d\u0926\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965",
    ro:"nitya\u015buddhavimukto'ha\u1e43 nir\u0101k\u0101ro'ham avyaya\u1e25\nbh\u016bm\u0101nandasvar\u016bpo'ha\u1e43 ahamev\u0101ham avyaya\u1e25",
    me:"I am eternally pure, I am liberated, I am formless, I am indestructible. I am of the nature of infinite, boundless bliss. I am the very Self, indestructible and changeless.",
    ins:"Purity here is not moral \u2014 it is ontological. Not 'I have become pure' but 'I am, by nature, never impure.' The liberation is not future \u2014 it is a recognition of what already is." },
  { n:4,
    sk:"\u0935\u093f\u091c\u094d\u091e\u093e\u0928\u0918\u0928\u0930\u0942\u092a\u094b\u093d\u0939\u0902 \u091a\u093f\u0926\u093e\u0915\u093e\u0936\u094b\u093d\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0964\n\u0915\u0947\u0935\u0932\u093e\u0928\u0928\u094d\u0926\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965",
    ro:"vij\u00f1\u0101naghanar\u016bpo'ha\u1e43 cid\u0101k\u0101\u015bo'ham avyaya\u1e25\nkeval\u0101nandar\u016bpo'ha\u1e43 ahamev\u0101ham avyaya\u1e25",
    me:"I am of the nature of dense, solid awareness. I am the sky of consciousness, indestructible. I am pure, unconditioned bliss. I am the very Self, indestructible and changeless.",
    ins:"Cid\u0101k\u0101\u015ba \u2014 the sky of consciousness \u2014 nothing sticks to it. Clouds pass. The sky remains. You are the sky, not the cloud." },
  { n:5,
    sk:"\u0928\u093f\u0924\u094d\u092f\u093e\u0928\u0928\u094d\u0926\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u0902 \u092a\u0930\u092e\u093e\u0928\u0928\u094d\u0926\u0930\u0942\u092a\u0927\u0943\u0915\u094d \u0964\n\u092e\u0941\u0915\u094d\u0924\u093e\u0928\u0928\u094d\u0926\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965",
    ro:"nity\u0101nandasvar\u016bpo'ha\u1e43 param\u0101nandar\u016bpadh\u1e5bk\nmukt\u0101nandasvar\u016bpo'ha\u1e43 ahamev\u0101ham avyaya\u1e25",
    me:"I am of the nature of eternal bliss. I am the bearer of the form of supreme bliss. I am the bliss of liberation. I am the very Self, indestructible and changeless.",
    ins:"Three flavors of \u0101nanda in one verse: nitya (eternal), parama (supreme), mukta (free). Shankara is not repeating \u2014 he is descending, like three steps into the same ocean." },
  { n:6,
    sk:"\u0938\u0924\u094d\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u093f\u0924\u094d\u092f\u0947\u0935\u0902 \u092f\u0903 \u0915\u0930\u094b\u0924\u093f \u0938\u0926\u093e \u091c\u092a\u092e\u094d \u0964\n\u092d\u0935\u092a\u093e\u0936\u0935\u093f\u0928\u093f\u0930\u094d\u092e\u0941\u0915\u094d\u0924\u0903 \u0938 \u092f\u093e\u0924\u093f \u092a\u0930\u092e\u093e\u0902 \u0917\u0924\u093f\u092e\u094d \u0965",
    ro:"satsvar\u016bpo'ham ityeva\u1e43 ya\u1e25 karoti sad\u0101 japam\nbhavap\u0101\u015bavinirmukta\u1e25 sa y\u0101ti param\u0101\u1e43 gatim",
    me:"One who constantly repeats as japa 'I am of the nature of pure existence' \u2014 freed from the bonds of worldly existence, that one attains the supreme state.",
    ins:"The japa is not a request to become. It is a remembering of what you already are. The repetition wears down the false, not builds the true." },
  { n:7,
    sk:"\u0905\u0939\u092e\u0947\u0935 \u092a\u0930\u0902 \u092c\u094d\u0930\u0939\u094d\u092e \u0905\u0939\u092e\u0947\u0935 \u092a\u0930\u0902 \u092a\u0926\u092e\u094d \u0964\n\u0905\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965",
    ro:"ahameva para\u1e43 brahma ahameva para\u1e43 padam\nahamev\u0101hamev\u0101ha\u1e43 ahamev\u0101ham avyaya\u1e25",
    me:"I alone am the supreme Brahman. I alone am the supreme state. I am, I am, I am \u2014 I am the very Self, indestructible and changeless.",
    ins:"The 'I' speaking here is not the ego. The ego cannot say 'I am Brahman' truthfully. Only Brahman can say it. To realize this verse is to realize who is speaking." },
  { n:8,
    sk:"\u0905\u0928\u094d\u0924\u0930\u093e\u0924\u094d\u092e\u0938\u094d\u0935\u0930\u0942\u092a\u094b\u093d\u0939\u0902 \u092a\u094d\u0930\u0924\u094d\u092f\u0917\u093e\u0924\u094d\u092e\u0938\u094d\u0935\u0930\u0942\u092a\u0927\u0943\u0915\u094d \u0964\n\u0936\u0941\u0926\u094d\u0927\u091a\u0948\u0924\u0928\u094d\u092f\u0930\u0942\u092a\u094b\u093d\u0939\u092e\u0939\u092e\u0947\u0935\u093e\u0939\u092e\u0935\u094d\u092f\u092f\u0903 \u0965",
    ro:"antar\u0101tmasvar\u016bpo'ha\u1e43 pratyag\u0101tmasvar\u016bpadh\u1e5bk\n\u015buddhacaitanyar\u016bpo'ha\u1e43 ahamev\u0101ham avyaya\u1e25",
    me:"I am the inner Self. I am the bearer of the form of the innermost Self, the awareness that turns back inward. I am pure consciousness itself. I am the very Self, indestructible and changeless.",

setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 800);
}

// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
//  CLEAR
// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function clearAll() {
if (!confirm(‘Clear all reflections and begin fresh?\n\nThis cannot be undone.’)) return;
ent={}; idx=0; home=true; ts=null; purge(); render();
}

// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
//  UTILITY ROW
// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function utilRow() {
if (cnt()===0) return ‘’;
return `<div class="util-row">
<button class="btn btn-secondary btn-sm" onclick="exportJ()">Export Journal \u2193</button>
<button class="btn btn-danger" onclick="clearAll()">Clear All</button>

  </div>`;
}

// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
//  SCREENS
// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function rIntro() {
const c  = cnt();
const ri = Math.min(idx, V.length-1);
const hasProgress = ri > 0 || c > 0;
return `<div class="intro"> <span class="intro-om">\u0950</span> <h2>${hasProgress ? 'Welcome Back' : 'Begin the Reflection'}</h2> <p>The <em>Brahma Jn\u0101naval\u012b M\u0101l\u0101</em> is a garland of 20 verses composed by Adi Shankaracharya. Each verse is an assertion \u2014 not a prayer, not a petition \u2014 but a declaration of what you already are.</p> <p>This is not a study exercise. It is an <em>abhy\u0101sa</em> \u2014 a practice of inward repetition. Move through one verse at a time. Read. Sit. Write whatever arises.</p> <div class="intro-quote"> "Sak\u1e5bt \u015brava\u1e47am\u0101tre\u1e47a brahmaj\u00f1\u0101na\u1e43 yato bhavet" \u2014<br> By hearing even once, the knowledge of Brahman arises. </div> <div class="btn-row"> ${ri > 0 ? `<button class="btn btn-primary" onclick="resumeAt(${ri})">Continue \u2014 Verse ${ri+1}</button>
<button class="btn btn-secondary" onclick="fresh()">From Verse I</button>`:`<button class="btn btn-primary" onclick="fresh()">Begin \u2014 Verse I</button>`} </div> ${c>0 ? `<p class="resume-note">${c} reflection${c>1?‘s’:’’} held \u00b7 ${fmtTs(ts)}</p>` : ‘’}
${utilRow()}

  </div>`;
}

function rVerse(i) {
const v   = V[i];
const pct = Math.round((i/V.length)*100);
return `<div class="progress-wrap"> <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div> <span class="progress-label">Verse ${i+1} of ${V.length}</span> </div> <div class="card verse-card"> <div class="verse-tag">Verse ${v.n} &nbsp;\u00b7&nbsp; \u092c\u094d\u0930\u0939\u094d\u092e\u091c\u094d\u091e\u093e\u0928\u093e\u0935\u0932\u0940\u092e\u093e\u0932\u093e</div> <div class="verse-sk">${v.sk.replace(/\n/g,'<br>')}</div> <div class="verse-ro">${v.ro.replace(/\n/g,'<br>')}</div> <div class="divider"><span>\u2726</span></div> <div class="verse-me">${v.me}</div> <div class="verse-in">${v.ins}</div> </div> <div class="card journal-card"> <div class="journal-label">Reflection</div> <textarea id="ji" class="journal-ta" placeholder="Write whatever arises \u2014 no right answer, no performance..." rows="6" oninput="schedAutosave()" >${esc(ent[i]||'')}</textarea> <div id="si" class="saved-ind"></div> </div> <div class="actions"> ${i>0 ?`<button class="btn btn-secondary" onclick="go(${i-1})">\u2190 Previous</button>`: ''} ${i<V.length-1 ?`<button class="btn btn-primary" onclick="go(${i+1})">Next Verse \u2192</button>`:`<button class="btn btn-primary" onclick="finish()">Complete the M\u0101l\u0101 \u2726</button>`} <button class="btn btn-secondary btn-sm ml-auto" onclick="goHome()">\u2302 Home</button> </div> ${utilRow()}`;
}

function rCompletion() {
const c = cnt();
return `<div class="completion"> <div class="comp-star">\u2726</div> <h2>The M\u0101l\u0101 is Complete</h2> <p>${c>0 ? `${c} reflection${c>1?‘s’:’’} now live in your journal.`: 'The garland has been offered.'}</p> <div class="comp-maha"> <em>"Brahma satya\u1e43 jaganmithy\u0101 j\u012bvo brahmaiva n\u0101para\u1e25"</em><br> Brahman is real. The universe is appearance. The self is Brahman alone. </div> <div class="btn-row" style="margin-bottom:14px"> <button class="btn btn-primary" onclick="fresh()">Begin Again</button> ${c>0 ?`<button class="btn btn-secondary" onclick="exportJ()">Export Journal \u2193</button>`: ''} </div> ${c>0 ?`<button class="btn btn-danger" onclick="clearAll()">Clear All Reflections</button>` : ‘’}

  </div>`;
}

// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
//  NAVIGATION
// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function render() {
const app = document.getElementById(‘app’);
if (!app) return;
if (home) {
app.innerHTML = rIntro();
} else if (idx >= V.length) {
app.innerHTML = rCompletion();
} else {
app.innerHTML = rVerse(idx);
refreshInd();
window.scrollTo({top:0, behavior:‘smooth’});
}
}

function fresh()       { home=false; idx=0; save(); render(); }
function resumeAt(i)   { home=false; idx=i; save(); render(); }
function goHome()      { flush(); home=true; save(); render(); }
function go(i)         { flush(); idx=i; save(); render(); }
function finish()      { flush(); idx=V.length; save(); render(); }

render();
</script>

</body>
</html>
