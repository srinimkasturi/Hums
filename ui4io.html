<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
height: 100%;
width: 100%;
overflow: hidden;
}

body {
font-family: ‘Space Mono’, monospace;
background-color: #f5f0e8;
color: #1a1208;
display: flex;
flex-direction: column;
padding-bottom: env(safe-area-inset-bottom);
}

/* ── HEADER ── */
.hdr {
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: space-between;
padding: 10px 16px;
background-color: #1a1208;
border-bottom: 2px solid #1a1208;
}

.logo {
font-family: ‘Playfair Display’, serif;
font-size: 1.25rem;
font-weight: 700;
color: #f5f0e8;
letter-spacing: -0.02em;
}

.logo em { color: #f5a623; font-style: italic; }

.hdr-count { font-size: 0.65rem; color: #999; letter-spacing: 0.1em; }

/* ── SEARCH ── */
.search-row {
flex-shrink: 0;
display: flex;
align-items: center;
gap: 8px;
padding: 8px 14px;
background-color: #e8dfc8;
border-bottom: 1px solid #c8b89a;
}

.search-wrap { position: relative; flex: 1; }

.search-row input {
width: 100%;
border: 1.5px solid #1a1208;
background-color: #f5f0e8;
font-family: ‘Space Mono’, monospace;
font-size: 0.72rem;
padding: 6px 10px;
outline: none;
color: #1a1208;
-webkit-appearance: none;
border-radius: 0;
}

.search-row input:focus { border-color: #b8860b; }
.search-row input::placeholder { color: #aaa; }

.search-clear {
background: none; border: none; cursor: pointer;
font-size: 1rem; color: #888; padding: 4px 6px; line-height: 1;
}

.search-drop {
display: none;
position: absolute;
top: 100%; left: 0; right: 0;
background-color: #f5f0e8;
border: 1.5px solid #1a1208;
border-top: none;
max-height: 220px;
overflow-y: auto;
z-index: 99;
box-shadow: 3px 3px 0 rgba(0,0,0,0.12);
}

.search-drop.open { display: block; }

.drop-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #e8dfc8; }
.drop-item:hover, .drop-item:active { background-color: #e8dfc8; }
.drop-item .dn { font-size: 0.6rem; color: #999; }
.drop-item .dt { font-size: 0.75rem; color: #1a1208; margin-top: 2px; }
.drop-item mark { background-color: #f5a623; color: #1a1208; }

/* ── CARD STAGE ── */
.stage {
flex: 1;
min-height: 0;
display: flex;
align-items: center;
justify-content: center;
padding: 10px 14px;
overflow: hidden;
background-color: #f5f0e8;
position: relative;
}

.empty {
display: none;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 8px;
color: #999;
font-style: italic;
font-size: 0.8rem;
font-family: ‘Playfair Display’, serif;
position: absolute;
}
.empty.show { display: flex; }
.empty .ei { font-size: 1.8rem; font-style: normal; }

.stack {
position: relative;
width: 100%;
max-width: 520px;
}

.ghost {
position: absolute;
inset: 0;
border: 1.5px solid #c8b89a;
background-color: #e8dfc8;
}
.g1 { transform: rotate(2deg) translateY(5px); }
.g2 { transform: rotate(-1.5deg) translateY(10px); }

/* ── CARD ── */
.card {
position: relative;
background-color: #f5f0e8;
border: 2px solid #1a1208;
box-shadow: 4px 4px 0 #1a1208;
display: flex;
flex-direction: column;
cursor: grab;
-webkit-user-select: none;
user-select: none;
}

.card.dragging { cursor: grabbing; }

@keyframes outL { to   { transform: translateX(-110%) rotate(-7deg); opacity: 0; } }
@keyframes outR { to   { transform: translateX(110%)  rotate(7deg);  opacity: 0; } }
@keyframes inL  { from { transform: translateX(110%)  rotate(7deg);  opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes inR  { from { transform: translateX(-110%) rotate(-7deg); opacity: 0; } to { transform: none; opacity: 1; } }

.card.out-l { animation: outL 0.26s ease forwards; }
.card.out-r { animation: outR 0.26s ease forwards; }
.card.in-l  { animation: inL  0.26s ease forwards; }
.card.in-r  { animation: inR  0.26s ease forwards; }

.c-num {
position: absolute; top: 8px; right: 12px;
font-family: ‘Playfair Display’, serif;
font-size: 2.4rem; font-weight: 700;
color: rgba(26,18,8,0.07); line-height: 1; pointer-events: none;
}

.darrow {
position: absolute; top: 14px;
font-family: ‘Playfair Display’, serif;
font-size: 1.8rem; font-weight: 700;
opacity: 0; pointer-events: none; z-index: 5;
}
.darrow-l { left: 12px;  color: #2c5282; }
.darrow-r { right: 12px; color: #c0392b; }

/* ── CARD SECTIONS ── */
.sec { padding: 12px 16px; flex: 1; }
.sec + .sec { border-top: 1px dashed #c8b89a; }

.tag {
display: inline-block;
font-size: 0.55rem; font-family: ‘Space Mono’, monospace;
letter-spacing: 0.1em; text-transform: uppercase;
padding: 2px 7px; margin-bottom: 8px; font-weight: 700;
border: 1.5px solid;
}

.sec-u .tag { border-color: #c0392b; color: #c0392b; background-color: rgba(192,57,43,0.06); }
.sec-o .tag { border-color: #556b2f; color: #556b2f; background-color: rgba(85,107,47,0.06); }
.sec-m .tag { border-color: #2c5282; color: #2c5282; background-color: rgba(44,82,130,0.06); }
.sec-m      { background-color: rgba(44,82,130,0.03); }

.sec-text { font-family: ‘Playfair Display’, serif; line-height: 1.55; color: #1a1208; }
.sec-u .sec-text { font-size: 0.92rem; font-weight: 700; }
.sec-o .sec-text { font-size: 0.8rem; font-style: italic; }
.sec-m .sec-text { font-size: 0.76rem; }

.placeholder { color: #bbb; font-family: ‘Space Mono’, monospace; font-size: 0.65rem; font-style: italic; }

/* ── HINT ── */
.hint {
position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
font-size: 0.52rem; color: #bbb; letter-spacing: 0.08em;
text-transform: uppercase; pointer-events: none; white-space: nowrap;
opacity: 0; transition: opacity 0.4s;
}
.hint.show { opacity: 1; }

/* ── NAV BAR ── */
.nav {
flex-shrink: 0;
display: flex; align-items: center; justify-content: space-between;
padding: 8px 10px;
background-color: #1a1208;
border-top: 2px solid #1a1208;
gap: 4px;
}

.nb {
background: none; border: 1.5px solid #444; color: #ccc;
font-family: ‘Space Mono’, monospace; font-size: 0.58rem;
padding: 6px 8px; cursor: pointer; letter-spacing: 0.05em;
text-transform: uppercase; white-space: nowrap;
-webkit-appearance: none; border-radius: 0;
}
.nb:active { border-color: #f5a623; color: #f5a623; }

.nb-rnd {
background-color: #f5a623; border-color: #f5a623;
color: #1a1208; font-weight: 700;
}
.nb-rnd:active { background-color: #d4891a; border-color: #d4891a; }

.nav-mid { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
.nav-nums { font-size: 0.58rem; color: #888; letter-spacing: 0.05em; }

.prog-bar { width: 72px; height: 2px; background-color: #333; overflow: hidden; }
.prog-fill { height: 100%; background-color: #f5a623; width: 0%; transition: width 0.25s ease; }

/* ── TIMER STRIP ── */
.timer-strip { flex-shrink: 0; background-color: #111; border-top: 1px solid #2a2218; }
.timer-bar   { height: 3px; background-color: #222; overflow: hidden; }
.timer-fill  { height: 100%; width: 0%; background-color: #f5a623; }

.timer-row {
display: flex; align-items: center; justify-content: center;
gap: 5px; padding: 5px 10px 6px;
}

.t-label { font-size: 0.52rem; color: #555; text-transform: uppercase; letter-spacing: 0.08em; }

.t-play {
background: none; border: 1.5px solid #444; color: #999;
width: 24px; height: 24px;
display: flex; align-items: center; justify-content: center;
cursor: pointer; font-size: 0.65rem;
-webkit-appearance: none; border-radius: 0; flex-shrink: 0;
}
.t-play.on { border-color: #f5a623; color: #f5a623; }

.t-spd {
background: none; border: 1px solid #333; color: #666;
font-family: ‘Space Mono’, monospace; font-size: 0.52rem;
padding: 3px 7px; cursor: pointer;
-webkit-appearance: none; border-radius: 0;
}
/* ── MY SIGHT TEXTAREA ── */
.tag-row {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 8px;
}
.tag-row .tag { margin-bottom: 0; }

.saved-badge {
font-size: 0.52rem; font-family: ‘Space Mono’, monospace;
color: #556b2f; letter-spacing: 0.06em; text-transform: uppercase;
opacity: 0; transition: opacity 0.4s;
}
.saved-badge.show { opacity: 1; }

#tM {
width: 100%; min-height: 56px;
background: none; border: none; border-bottom: 1px dashed #c8b89a;
font-family: ‘Playfair Display’, serif; font-size: 0.8rem;
font-style: italic; color: #1a1208; line-height: 1.55;
resize: none; outline: none; padding: 0;
-webkit-appearance: none; border-radius: 0;
caret-color: #2c5282;
}
#tM::placeholder { color: #bbb; font-size: 0.7rem; }
#tM:focus { border-bottom-color: #2c5282; }
</style>

oes along with you as your own Santa. Your Elf Self as Self Help!!"},{"num":81,"useless":"Peers Peering glass","optimism":"Your peers compete and cooperate at the same time. Their insights about you that you don't know about yourself is good! Corporates call this 360 feedback!"},{"num":82,"useless":"Seething till see things","optimism":"See from the perspective of those you think harmed you — it is not always the case that others harm you intentionally."},{"num":83,"useless":"Fear is dreams on life support","optimism":"Fear of success and failure keep pursuit of success on life support until it perishes. Let the fears go and allow pursuit to breathe free."},{"num":84,"useless":"Sunrise is between midday and midnight","optimism":"During new beginnings don't worry about future and past — use the light of now."},{"num":85,"useless":"Monkey cheeks","optimism":"Monkeys hold food in their cheeks to eat when hungry. We can learn to taste but not gorge — like a savings account vs a checking account!"},{"num":86,"useless":"Metaphor is a struggle","optimism":"Any metaphor is a struggle to explain a concept. Use it but don't be boxed by it."},{"num":87,"useless":"Peace is perception","optimism":"Survive, Strive, Arrive, Thrive, Derive — just levels of momentary peace. Feel it and let it fleet. When at peace with pulsing peace, you become a perceptor not a receptor."},{"num":88,"useless":"Restless rest lest","optimism":"Even restless rest is rest. Lest you forget — stillness in any form beats none."},{"num":89,"useless":"Canopy calls climb","optimism":"Chimp cubs keep climbing only to fall back until they reach the canopy"},{"num":90,"useless":"Insight out of sight","optimism":"When the distraction of sight recedes, insights have a chance to dawn"},{"num":91,"useless":"Selfbet selfhedge","optimism":"Betting on ourselves needs knowing how to hedge against ourselves — knowing how to hedge our own path helps us stay on it."},{"num":92,"useless":"Leg up dog is happy","optimism":"Don't hold that which needs to get out and be flushed! It will keep your dog and you equally happy."},{"num":93,"useless":"Tired sole, less tired soul","optimism":"Travel of any kind grows us and gives an extra ounce of energy, after due rest and recovery of course."},{"num":94,"useless":"Shallow fallow hollow makes","optimism":"Rest well so rust falls off"},{"num":95,"useless":"White space is color full","optimism":"When you have nothing to do or feel like you can do nothing, relax — it's time for insights to dawn."},{"num":96,"useless":"Play parents insight","optimism":"Insighting is witnessed when space is made for it to occupy. So play when you're struck out or stuck."},{"num":97,"useless":"As be, become","optimism":"Accept being, aim becoming. Don't let being define becoming. Accept who you are now but aim to become who you want to grow to be."},{"num":98,"useless":"Err may be the seed of insight","optimism":"To Err is Human they say — to insight is human too, as of today. So be free to err!!"},{"num":99,"useless":"Hyphenate distress","optimism":"When you put space in distress it becomes de-stress. Play of words for sure. Test it though — it has a nugget of personal experience."},{"num":100,"useless":"Freedom is in the center of the box as well","optimism":"When you know the core of a situation it is a bit easier to focus on solution options."},{"num":101,"useless":"Stillness deepens","optimism":"Still waters seep deep and so does a still mind. Take advantage of decreased distractions that come from stillness, including physical stillness."},{"num":102,"useless":"Obvious first obfuscates","optimism":"What is obvious to us at first glance is conditioned by color of our past perceptions — give yourself a chance to see more."},{"num":103,"useless":"Fight flight freeze breathe","optimism":"To unbox yourself from fight-flight-freeze responses, leverage breathing — let the life force of intelligence be made available to you again."},{"num":104,"useless":"Unbox to breat ,"optimism":"Put out positive change into society so it may multiply. When its multiplication returns, take back just the change you put in — in the form of you changing."},{"num":116,"useless":"Hope hop","optimism":"The hoping game is a hopping roller coaster from one partially fulfilled desire to the next"},{"num":117,"useless":"Birth births more than birthed","optimism":"In the very first breath of one's child, responsibility pours out to help us become who we are capable of deep inside."}];

let pool = [...DATA], cur = 0;

const card=document.getElementById('card'), cNum=document.getElementById('cNum'),
  tU=document.getElementById('tU'), tO=document.getElementById('tO'), tM=document.getElementById('tM'),
  progFill=document.getElementById('progFill'), navNums=document.getElementById('navNums'),
  hdrCount=document.getElementById('hdrCount'), srch=document.getElementById('srch'),
  srchDrop=document.getElementById('srchDrop'), srchClear=document.getElementById('srchClear'),
  stack=document.getElementById('stack'), empty=document.getElementById('empty'),
  hint=document.getElementById('hint'), dL=document.getElementById('dL'), dR=document.getElementById('dR'),
  tFill=document.getElementById('tFill'), tPlay=document.getElementById('tPlay'),
  savedBadge=document.getElementById('savedBadge');

// ── localStorage helpers ──
function noteKey(num){ return 'ui_note_'+num; }
function loadNote(num){ try{ return localStorage.getItem(noteKey(num))||''; }catch(e){ return ''; } }
function saveNote(num, val){ try{ if(val) localStorage.setItem(noteKey(num),val); else localStorage.removeItem(noteKey(num)); }catch(e){} }

let saveTimer = null;
function flashSaved(){
  savedBadge.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>savedBadge.classList.remove('show'), 1800);
}

tM.addEventListener('input', ()=>{
  const d = pool[cur];
  if(!d) return;
  saveNote(d.num, tM.value);
  flashSaved();
});

// Block swipe when textarea is focused
tM.addEventListener('touchstart', e=>e.stopPropagation(), {passive:true});
tM.addEventListener('mousedown', e=>e.stopPropagation());

function render() {
  if (!pool.length) return;
  const d = pool[cur];
  cNum.textContent = d.num;
  tU.textContent = d.useless;
  tO.textContent = d.optimism || '…';
  tM.value = loadNote(d.num);
  savedBadge.classList.remove('show');
  const pct = ((cur+1)/pool.length)*100;
  progFill.style.width = pct+'%';
  const lbl = `${cur+1} / ${pool.length}`;
  navNums.textContent = lbl; hdrCount.textContent = lbl;
}

function go(n, dir) {
  if (!pool.length) return;
  n = ((n % pool.length) + pool.length) % pool.length;
  if (n === cur && pool.length > 1) return;
  hint.classList.remove('show');
  const outC = dir>=0 ? 'out-l':'out-r', inC = dir>=0 ? 'in-l':'in-r';
  card.classList.add(outC);
  setTimeout(()=>{ card.classList.remove(outC); cur=n; render(); card.classList.add(inC); setTimeout(()=>card.classList.remove(inC),280); },240);
}

function next(){ go(cur+1,1); }
function prev(){ go(cur-1,-1); }

document.getElementById('bNext').onclick = ()=>{ next(); resetTimer(); };
document.getElementById('bPrev').onclick = ()=>{ prev(); resetTimer(); };
document.getElementById('bRnd').onclick  = ()=>{ go(Math.floor(Math.random()*pool.length),1); resetTimer(); };

document.addEventListener('keydown', e=>{
  if(document.activeElement===srch||document.activeElement===tM) return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){ next(); resetTimer(); }
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')  { prev(); resetTimer(); }
});

// ── Swipe ──
let sx=0,sy=0,drag=false,dx=0;

card.addEventListener('touchstart', e=>{
  if(e.target.closest('button,input')) return;
  sx=e.touches[0].clientX; sy=e.touches[0].clientY; drag=true; dx=0;
  card.classList.add('dragging');
},{passive:true});

card.addEventListener('touchmove', e=>{
  if(!drag) return;
  dx = e.touches[0].clientX - sx;
  const dy = e.touches[0].clientY - sy;
  if(Math.abs(dx)<Math.abs(dy)){ drag=false; card.classList.remove('dragging'); return; }
  e.preventDefault();
  card.style.transform=`translateX(${dx}px) rotate(${dx*0.04}deg)`;
  dL.style.opacity = dx>30 ? Math.min((dx-30)/60,1):0;
  dR.style.opacity = dx<-30 ? Math.min((-dx-30)/60,1):0;
},{passive:false});

function endDrag(){
  if(!drag) return; drag=false; card.classList.remove('dragging');
  card.style.transform=''; dL.style.opacity=0; dR.style.opacity=0;
  if(dx>70){ prev(); resetTimer(); } else if(dx<-70){ next(); resetTimer(); }
  dx=0;
}
card.addEventListener('touchend', endDrag);

card.addEventListener('mousedown', e=>{
  if(e.target.closest('button,input')) return;
  sx=e.clientX; sy=e.clientY; drag=true; dx=0; card.classList.add('dragging');
});
window.addEventListener('mousemove', e=>{
  if(!drag) return;
  dx=e.clientX-sx;
  card.style.transform=`translateX(${dx}px) rotate(${dx*0.04}deg)`;
  dL.style.opacity=dx>30?Math.min((dx-30)/60,1):0;
  dR.style.opacity=dx<-30?Math.min((-dx-30)/60,1):0;
});
window.addEventListener('mouseup', endDrag);

// ── Search ──
function esc(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function hi(t,q){ return t.replace(new RegExp(`(${esc(q)})`,'gi'),'<mark>$1</mark>'); }

srch.addEventListener('input', ()=>{
  const q=srch.value.trim().toLowerCase();
  if(!q){ srchDrop.classList.remove('open'); pool=[...DATA]; cur=0; stack.style.display=''; empty.classList.remove('show'); render(); return; }
  const hits=DATA.filter(d=>d.useless.toLowerCase().includes(q)||d.optimism.toLowerCase().includes(q)||String(d.num).includes(q));
  if(!hits.length){ srchDrop.innerHTML='<div class="drop-item" style="color:#aaa;font-style:italic;">No results</div>'; srchDrop.classList.add('open'); return; }
  srchDrop.innerHTML=hits.slice(0,10).map(d=>`<div class="drop-item" data-i="${DATA.indexOf(d)}"><div class="dn">#${d.num}</div><div class="dt">${hi(d.useless.substring(0,72),q)}${d.useless.length>72?'…':''}</div></div>`).join('');
  srchDrop.classList.add('open');
});

srchDrop.addEventListener('click', e=>{
  const item=e.target.closest('[data-i]'); if(!item) return;
  const di=parseInt(item.dataset.i);
  const q=srch.value.trim().toLowerCase();
  pool=DATA.filter(d=>d.useless.toLowerCase().includes(q)||d.optimism.toLowerCase().includes(q)||String(d.num).includes(q));
  cur=pool.findIndex(d=>DATA.indexOf(d)===di); if(cur<0) cur=0;
  srchDrop.classList.remove('open'); stack.style.display=''; empty.classList.remove('show'); render();
});

srchClear.addEventListener('click', ()=>{ srch.value=''; srchDrop.classList.remove('open'); pool=[...DATA]; cur=0; stack.style.display=''; empty.classList.remove('show'); render(); });

document.addEventListener('click', e=>{ if(!e.target.closest('.search-wrap')&&!e.target.closest('#srchClear')) srchDrop.classList.remove('open'); });

// ── Auto-timer ──
let tDur=10000, tStart=null, tRAF=null, tOn=false;

function timerTick(ts){
  if(!tStart) tStart=ts;
  const pct=Math.min((ts-tStart)/tDur*100,100);
  tFill.style.width=pct+'%';
  if(pct>=100){ tFill.style.width='0%'; tStart=null; go(Math.floor(Math.random()*pool.length),1); }
  tRAF=requestAnimationFrame(timerTick);
}

function startTimer(){ tOn=true; tStart=null; tFill.style.width='0%'; tPlay.textContent='⏸'; tPlay.classList.add('on'); if(tRAF) cancelAnimationFrame(tRAF); tRAF=requestAnimationFrame(timerTick); }
function stopTimer(){ tOn=false; if(tRAF){ cancelAnimationFrame(tRAF); tRAF=null; } tFill.style.width='0%'; tStart=null; tPlay.textContent='▶'; tPlay.classList.remove('on'); }
function resetTimer(){ if(tOn){ tStart=null; tFill.style.width='0%'; } }

tPlay.addEventListener('click', ()=>tOn?stopTimer():startTimer());

document.querySelectorAll('.t-spd').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.t-spd').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on'); tDur=parseInt(btn.dataset.ms);
    if(tOn){ stopTimer(); startTimer(); }
  });
});

render();
</script>

</body>
</html>
