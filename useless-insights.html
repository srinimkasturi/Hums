// ── SVG loading ────────────────────────────────────────────
// Fetches insight_svgs.json from same folder (GitHub Pages).
// Falls back gracefully if file not yet present.
const SVG_LS_KEY = 'ui_svgs_v2';
let svgMap = {};

async function loadSvgs() {
  // 1. Check localStorage cache first
  try {
    const cached = localStorage.getItem(SVG_LS_KEY);
    if (cached) { svgMap = JSON.parse(cached); setSvg(pool[cur].num); return; }
  } catch(e) {}

  // 2. Fetch from GitHub Pages (same directory)
  try {
    const res = await fetch('./insight_svgs.json');
    if (res.ok) {
      svgMap = await res.json();
      try { localStorage.setItem(SVG_LS_KEY, JSON.stringify(svgMap)); } catch(e) {}
      setSvg(pool[cur].num);
      return;
    }
  } catch(e) {}

  // 3. No SVGs available — show nothing (card still works fine)
  setSvg(pool[cur].num);
}

function setSvg(num) {
  const el = document.getElementById('cardSvg');
  if (!el) return;
  const inner = svgMap[String(num)];
  if (inner) {
    el.innerHTML = inner;
    el.style.opacity = '0.55';
  } else {
    el.innerHTML = '';
  }
}

// ── Core ───────────────────────────────────────────────────
let pool = [...DATA], cur = 0;

const card=document.getElementById('card'),cNum=document.getElementById('cNum'),
  tU=document.getElementById('tU'),tO=document.getElementById('tO'),tM=document.getElementById('tM'),
  progFill=document.getElementById('progFill'),navNums=document.getElementById('navNums'),
  hdrCount=document.getElementById('hdrCount'),srch=document.getElementById('srch'),
  srchDrop=document.getElementById('srchDrop'),srchClear=document.getElementById('srchClear'),
  stack=document.getElementById('stack'),empty=document.getElementById('empty'),
  hint=document.getElementById('hint'),dL=document.getElementById('dL'),dR=document.getElementById('dR'),
  tFill=document.getElementById('tFill'),tPlay=document.getElementById('tPlay'),
  savedBadge=document.getElementById('savedBadge');

// localStorage notes
function noteKey(n){ return 'ui_note_'+n; }
function loadNote(n){ try{ return localStorage.getItem(noteKey(n))||''; }catch(e){ return ''; } }
function saveNote(n,v){ try{ v?localStorage.setItem(noteKey(n),v):localStorage.removeItem(noteKey(n)); }catch(e){} }
let saveTimer=null;
function flashSaved(){ savedBadge.classList.add('show'); clearTimeout(saveTimer); saveTimer=setTimeout(()=>savedBadge.classList.remove('show'),1800); }
tM.addEventListener('input',()=>{ const d=pool[cur]; if(d){ saveNote(d.num,tM.value); flashSaved(); } });
tM.addEventListener('touchstart',e=>e.stopPropagation(),{passive:true});
tM.addEventListener('mousedown',e=>e.stopPropagation());

function render() {
  if (!pool.length) return;
  const d = pool[cur];
  cNum.textContent = d.num;
  tU.textContent = d.useless;
  tO.textContent = d.optimism || '\u2026';
  tM.value = loadNote(d.num);
  savedBadge.classList.remove('show');
  setSvg(d.num);
  const pct = ((cur+1)/pool.length)*100;
  progFill.style.width = pct+'%';
  const lbl = `${cur+1} / ${pool.length}`;
  navNums.textContent = lbl; hdrCount.textContent = lbl;
}

function go(n,dir) {
  if (!pool.length) return;
  n = ((n%pool.length)+pool.length)%pool.length;
  if (n===cur && pool.length>1) return;
  hint.classList.remove('show');
  const oc=dir>=0?'out-l':'out-r', ic=dir>=0?'in-l':'in-r';
  card.classList.add(oc);
  setTimeout(()=>{ card.classList.remove(oc); cur=n; render(); card.classList.add(ic); setTimeout(()=>card.classList.remove(ic),280); },240);
}
function next(){ go(cur+1,1); }
function prev(){ go(cur-1,-1); }

document.getElementById('bNext').onclick=()=>{ next(); resetTimer(); };
document.getElementById('bPrev').onclick=()=>{ prev(); resetTimer(); };
document.getElementById('bRnd').onclick=()=>{ go(Math.floor(Math.random()*pool.length),1); resetTimer(); };

document.addEventListener('keydown',e=>{
  if(document.activeElement===srch||document.activeElement===tM) return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){ next(); resetTimer(); }
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){ prev(); resetTimer(); }
});

// Swipe
let sx=0,sy=0,drag=false,dx=0;
card.addEventListener('touchstart',e=>{ if(e.target.closest('button,input,textarea')) return; sx=e.touches[0].clientX; sy=e.touches[0].clientY; drag=true; dx=0; card.classList.add('dragging'); },{passive:true});
card.addEventListener('touchmove',e=>{ if(!drag) return; dx=e.touches[0].clientX-sx; const dy=e.touches[0].clientY-sy; if(Math.abs(dx)<Math.abs(dy)){ drag=false; card.classList.remove('dragging'); return; } e.preventDefault(); card.style.transform=`translateX(${dx}px) rotate(${dx*0.04}deg)`; dL.style.opacity=dx>30?Math.min((dx-30)/60,1):0; dR.style.opacity=dx<-30?Math.min((-dx-30)/60,1):0; },{passive:false});
function endDrag(){ if(!drag) return; drag=false; card.classList.remove('dragging'); card.style.transform=''; dL.style.opacity=0; dR.style.opacity=0; if(dx>70){ prev(); resetTimer(); } else if(dx<-70){ next(); resetTimer(); } dx=0; }
card.addEventListener('touchend',endDrag);
card.addEventListener('mousedown',e=>{ if(e.target.closest('button,input,textarea')) return; sx=e.clientX; sy=e.clientY; drag=true; dx=0; card.classList.add('dragging'); });
window.addEventListener('mousemove',e=>{ if(!drag) return; dx=e.clientX-sx; card.style.transform=`translateX(${dx}px) rotate(${dx*0.04}deg)`; dL.style.opacity=dx>30?Math.min((dx-30)/60,1):0; dR.style.opacity=dx<-30?Math.min((-dx-30)/60,1):0; });
window.addEventListener('mouseup',endDrag);

// Search
function esc(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function hi(t,q){ return t.replace(new RegExp(`(${esc(q)})`,'gi'),'<mark>$1</mark>'); }
srch.addEventListener('input',()=>{
  const q=srch.value.trim().toLowerCase();
  if(!q){ srchDrop.classList.remove('open'); pool=[...DATA]; cur=0; stack.style.display=''; empty.classList.remove('show'); render(); return; }
  const hits=DATA.filter(d=>d.useless.toLowerCase().includes(q)||d.optimism.toLowerCase().includes(q)||String(d.num).includes(q));
  if(!hits.length){ srchDrop.innerHTML='<div class="drop-item" style="color:#aaa;font-style:italic;">No results</div>'; srchDrop.classList.add('open'); return; }
  srchDrop.innerHTML=hits.slice(0,10).map(d=>`<div class="drop-item" data-i="${DATA.indexOf(d)}"><div class="dn">#${d.num}</div><div class="dt">${hi(d.useless.substring(0,72),q)}${d.useless.length>72?'\u2026':''}</div></div>`).join('');
  srchDrop.classList.add('open');
});
srchDrop.addEventListener('click',e=>{ const item=e.target.closest('[data-i]'); if(!item) return; const di=parseInt(item.dataset.i); const q=srch.value.trim().toLowerCase(); pool=DATA.filter(d=>d.useless.toLowerCase().includes(q)||d.optimism.toLowerCase().includes(q)||String(d.num).includes(q)); cur=pool.findIndex(d=>DATA.indexOf(d)===di); if(cur<0) cur=0; srchDrop.classList.remove('open'); stack.style.display=''; empty.classList.remove('show'); render(); });
srchClear.addEventListener('click',()=>{ srch.value=''; srchDrop.classList.remove('open'); pool=[...DATA]; cur=0; stack.style.display=''; empty.classList.remove('show'); render(); });
document.addEventListener('click',e=>{ if(!e.target.closest('.search-wrap')&&!e.target.closest('#srchClear')) srchDrop.classList.remove('open'); });

// Auto-timer
let tDur=10000,tStart=null,tRAF=null,tOn=false;
function timerTick(ts){ if(!tStart) tStart=ts; const pct=Math.min((ts-tStart)/tDur*100,100); tFill.style.width=pct+'%'; if(pct>=100){ tFill.style.width='0%'; tStart=null; go(Math.floor(Math.random()*pool.length),1); } tRAF=requestAnimationFrame(timerTick); }
function startTimer(){ tOn=true; tStart=null; tFill.style.width='0%'; tPlay.textContent='\u23F8'; tPlay.classList.add('on'); if(tRAF) cancelAnimationFrame(tRAF); tRAF=requestAnimationFrame(timerTick); }
function stopTimer(){ tOn=false; if(tRAF){ cancelAnimationFrame(tRAF); tRAF=null; } tFill.style.width='0%'; tStart=null; tPlay.textContent='\u25B6'; tPlay.classList.remove('on'); }
function resetTimer(){ if(tOn){ tStart=null; tFill.style.width='0%'; } }
tPlay.addEventListener('click',()=>tOn?stopTimer():startTimer());
document.querySelectorAll('.t-spd').forEach(btn=>{ btn.addEventListener('click',()=>{ document.querySelectorAll('.t-spd').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); tDur=parseInt(btn.dataset.ms); if(tOn){ stopTimer(); startTimer(); } }); });

// Init
render();
loadSvgs();
</script>
